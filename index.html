  <div id="root"></div>

  <script type="text/babel">

    // --- 1. FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyAuRiEEvbtBmKxoUKGVU2It0otPVlsnomc",
      authDomain: "unileaguedraft.firebaseapp.com",
      projectId: "unileaguedraft",
      storageBucket: "unileaguedraft.firebasestorage.app",
      messagingSenderId: "510674802086",
      appId: "1:510674802086:web:8c03dda96447f3c2d9eb67",
      measurementId: "G-F0VBYWWZSE"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'unidraft-app';

    // --- 2. MOCK DATA & CONSTANTS ---
    const INITIAL_TEAMS = [
      { id: 1, name: 'Đội 1', colorFrom: 'from-red-600', colorTo: 'to-red-900', shadow: 'shadow-red-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(220,38,38,0.8)]', players: [] },
      { id: 2, name: 'Đội 2', colorFrom: 'from-blue-600', colorTo: 'to-blue-900', shadow: 'shadow-blue-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(37,99,235,0.8)]', players: [] },
      { id: 3, name: 'Đội 3', colorFrom: 'from-emerald-500', colorTo: 'to-emerald-800', shadow: 'shadow-emerald-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(16,185,129,0.8)]', players: [] },
      { id: 4, name: 'Đội 4', colorFrom: 'from-amber-500', colorTo: 'to-amber-800', shadow: 'shadow-amber-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(245,158,11,0.8)]', players: [] },
      { id: 5, name: 'Đội 5', colorFrom: 'from-purple-600', colorTo: 'to-purple-900', shadow: 'shadow-purple-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(147,51,234,0.8)]', players: [] },
      { id: 6, name: 'Đội 6', colorFrom: 'from-pink-600', colorTo: 'to-pink-900', shadow: 'shadow-pink-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(219,39,119,0.8)]', players: [] },
    ];
    const POSITIONS = ['Thủ môn', 'Hậu vệ', 'Tiền vệ', 'Tiền đạo'];
    const DEFAULT_CONFIG = { maxPlayersPerTeam: 7, teamNames: ['Đội 1', 'Đội 2', 'Đội 3', 'Đội 4', 'Đội 5', 'Đội 6'] };
    const DEFAULT_PASSCODE = "unidraft2024";

    // --- 3. HELPER COMPONENTS (ICONS) ---
    // Vì dùng CDN, ta tạo các component Icon đơn giản dùng SVG
    const IconShield = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    const IconGoal = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
    const IconFootprints = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 16v-2.38C4 11.5 5.97 9.5 8.38 9.5h7.24C18.03 9.5 20 11.5 20 13.62V16"/><path d="M12 22v-6"/><path d="M8 22v-6"/><path d="M16 22v-6"/><path d="M8 2a3 3 0 0 0-3 3"/><path d="M16 2a3 3 0 0 1 3 3"/></svg>;
    const IconUsers = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconTrophy = ({ className, size=24, strokeWidth=2 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconLock = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const IconMonitorPlay = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 8 6 4-6 4Z"/></svg>;
    const IconSmartphone = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const IconKeyRound = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>;
    const IconCloudOff = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.27"/></svg>;
    const IconRotateCcw = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconCheckCircle = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconQrCode = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>;
    const IconSettings = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconDices = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>;
    const IconHexagon = ({ className, size=16, opacity }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={{opacity}}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>;
    const IconChevronRight = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const IconX = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const IconUpload = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const IconDownload = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    const getPositionIcon = (pos) => {
      switch(pos) {
        case 'Thủ môn': return <IconShield className="text-amber-400" size={14} />;
        case 'Hậu vệ': return <IconShield className="text-blue-400" size={14} />;
        case 'Tiền vệ': return <IconFootprints className="text-emerald-400" size={14} />;
        case 'Tiền đạo': return <IconGoal className="text-rose-400" size={14} />;
        default: return <IconUsers className="text-slate-400" size={14} />;
      }
    };
    const getPositionColor = (pos) => {
      switch(pos) {
        case 'Thủ môn': return 'bg-amber-400/10 text-amber-400 border-amber-400/20';
        case 'Hậu vệ': return 'bg-blue-400/10 text-blue-400 border-blue-400/20';
        case 'Tiền vệ': return 'bg-emerald-400/10 text-emerald-400 border-emerald-400/20';
        case 'Tiền đạo': return 'bg-rose-400/10 text-rose-400 border-rose-400/20';
        default: return 'bg-slate-400/10 text-slate-400 border-slate-400/20';
      }
    };

    // --- 4. MAIN APP COMPONENT ---
    const { useState, useEffect, useRef } = React;

    function App() {
      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(false);
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passcodeInput, setPasscodeInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [currentPasscode, setCurrentPasscode] = useState(DEFAULT_PASSCODE);

      useEffect(() => {
        auth.signInAnonymously()
          .catch((error) => {
            console.error("Auth error:", error);
            setDbError(true);
          });
        
        const unsubscribe = auth.onAuthStateChanged((user) => setUser(user));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_security');
        const unsub = docRef.onSnapshot((snap) => {
          if (snap.exists && snap.data().passcode) setCurrentPasscode(snap.data().passcode);
        }, (err) => console.log(err));
        return () => unsub();
      }, [user, dbError]);

      const verifyPasscode = () => {
        if (passcodeInput === currentPasscode) {
          setShowAuthModal(false); setRole('admin'); setPasscodeInput(''); setAuthError('');
        } else { setAuthError('Mật khẩu không chính xác!'); }
      };

      if (!role) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 relative">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-500/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
            <div className="bg-slate-900/60 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-2xl z-10 max-w-2xl w-full text-center">
              <div className="flex justify-center mb-6">
                <div className="w-20 h-20 bg-gradient-to-br from-amber-300 to-amber-700 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.4)]">
                  <IconTrophy className="text-slate-950" size={40} />
                </div>
              </div>
              <h1 className="text-4xl font-black text-white uppercase tracking-wider mb-2">Hệ Thống Draft Realtime</h1>
              <p className="text-slate-400 mb-10">Vui lòng chọn vai trò để truy cập hệ thống UNI LEAGUE</p>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
                <button onClick={() => setShowAuthModal(true)}
                  className="group relative bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-8 flex flex-col items-center transition-all duration-300 hover:border-amber-500/50 hover:shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                  <div className="absolute top-4 right-4 bg-slate-900 p-1.5 rounded-md border border-white/10 text-amber-500/50"><IconLock size={14} /></div>
                  <IconMonitorPlay size={48} className="text-amber-400 mb-4 group-hover:scale-110 transition-transform" />
                  <h2 className="text-xl font-bold text-white mb-2">Màn hình Livestream</h2>
                  <p className="text-sm text-slate-400 text-center">Phòng dành cho MC và Quản trị viên (Cần Passcode)</p>
                </button>

                <button onClick={() => setRole('viewer')}
                  className="group bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-8 flex flex-col items-center transition-all duration-300 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                  <IconSmartphone size={48} className="text-blue-400 mb-4 group-hover:scale-110 transition-transform" />
                  <h2 className="text-xl font-bold text-white mb-2">Khán giả theo dõi</h2>
                  <p className="text-sm text-slate-400 text-center">Xem kết quả bốc thăm trực tiếp trên thời gian thực</p>
                </button>
              </div>
              {dbError && <p className="text-red-400 mt-6 text-sm font-bold bg-red-900/20 p-3 rounded-lg border border-red-500/20"><IconCloudOff size={16} className="inline mr-2"/> Hệ thống Database chưa kết nối được. Vui lòng kiểm tra lại mạng!</p>}
            </div>

            {showAuthModal && (
              <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                  <div className="flex justify-center mb-4"><div className="bg-amber-500/10 p-4 rounded-full border border-amber-500/20"><IconKeyRound className="text-amber-400" size={32} /></div></div>
                  <h3 className="text-xl font-black text-white uppercase tracking-widest mb-1">Xác thực Admin</h3>
                  <p className="text-xs text-slate-400 mb-6">Nhập mã PIN để truy cập bảng điều khiển.</p>
                  <input type="password" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && verifyPasscode()}
                    placeholder="Nhập Passcode..." className="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-center font-black tracking-widest text-amber-400 mb-2 focus:outline-none focus:border-amber-500 transition-colors" autoFocus />
                  {authError && <p className="text-rose-500 text-xs font-bold mb-4">{authError}</p>}
                  <div className="flex space-x-3 mt-6">
                    <button onClick={() => {setShowAuthModal(false); setAuthError(''); setPasscodeInput('');}} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition">Hủy</button>
                    <button onClick={verifyPasscode} className="flex-1 py-3 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-slate-950 font-black rounded-xl transition shadow-lg shadow-amber-500/20">Xác nhận</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return <DraftApplication role={role} user={user} dbError={dbError} onBack={() => setRole(null)} currentPasscode={currentPasscode} />;
    }

    // --- 5. COMPONENT MÀN HÌNH CHÍNH ---
    function DraftApplication({ role, user, dbError, onBack, currentPasscode }) {
      const [teams, setTeams] = useState(INITIAL_TEAMS);
      const [availablePlayers, setAvailablePlayers] = useState([]);
      const [config, setConfig] = useState(DEFAULT_CONFIG);
      const [lottery, setLottery] = useState({ active: false, phase: '', player: null, team: null });
      const [showSettings, setShowSettings] = useState(false);
      const [csvInput, setCsvInput] = useState('');
      const [newPasscode, setNewPasscode] = useState(currentPasscode);
      const [syncStatus, setSyncStatus] = useState('saved');
      
      const lastProcessedCmdId = useRef(null);
      const [teamTurnIndex, setTeamTurnIndex] = useState(0);

      useEffect(() => {
        if (!user || dbError) return;

        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_main');
        
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.teams) setTeams(data.teams);
            if (data.availablePlayers) setAvailablePlayers(data.availablePlayers);
            if (data.config) setConfig(data.config);
            
            if (data.lotteryCmd && data.lotteryCmd.id !== lastProcessedCmdId.current) {
              lastProcessedCmdId.current = data.lotteryCmd.id;
              playLotteryAnimation(data.lotteryCmd.player, data.lotteryCmd.team);
            }
          } else if (role === 'admin') {
             docRef.set({ teams: INITIAL_TEAMS, availablePlayers: [], config: DEFAULT_CONFIG, lotteryCmd: null }, { merge: true });
          }
        }, (err) => console.error("Snapshot error:", err));

        return () => unsubscribe();
      }, [user, role, dbError]);

      const syncToCloud = async (updates) => {
        if (user && !dbError) {
          setSyncStatus('saving');
          const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_main');
          await docRef.set(updates, { merge: true });
          setTimeout(() => setSyncStatus('saved'), 500); 
        }
      };

      const savePasscodeToCloud = async (newPass) => {
        if (user && !dbError && newPass.trim() !== '') {
          const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_security');
          await docRef.set({ passcode: newPass }, { merge: true });
          alert("Đã lưu Passcode mới thành công!");
        }
      };

      const triggerNextDraw = async () => {
        if (availablePlayers.length === 0 || lottery.active) return;

        let targetPos = 'Khác';
        let playerPool = [];
        for (let pos of POSITIONS) {
          const p = availablePlayers.filter(x => x.position === pos);
          if (p.length > 0) { targetPos = pos; playerPool = p; break; }
        }
        if (playerPool.length === 0) playerPool = availablePlayers.filter(x => !POSITIONS.includes(x.position));
        if (playerPool.length === 0) return;

        const actualPlayer = playerPool[Math.floor(Math.random() * playerPool.length)];

        let attempts = 0;
        let currentIdx = teamTurnIndex;
        while (teams[currentIdx].players.length >= config.maxPlayersPerTeam && attempts < teams.length) {
          currentIdx = (currentIdx + 1) % teams.length;
          attempts++;
        }
        if (attempts >= teams.length) return;

        const actualTeam = teams[currentIdx];
        setTeamTurnIndex((currentIdx + 1) % teams.length);

        const cmdId = Date.now().toString();
        await syncToCloud({ lotteryCmd: { id: cmdId, player: actualPlayer, team: actualTeam } });
      };

      const playLotteryAnimation = async (actualPlayer, actualTeam) => {
        setLottery({ active: true, phase: 'spin_player', player: null, team: null });
        const pool = availablePlayers.length > 0 ? availablePlayers : [actualPlayer];

        for(let i=0; i<25; i++) {
          setLottery(prev => ({...prev, player: pool[Math.floor(Math.random()*pool.length)]}));
          await new Promise(r => setTimeout(r, 60 + (i*2)));
        }
        
        setLottery(prev => ({...prev, phase: 'show_player', player: actualPlayer}));
        await new Promise(r => setTimeout(r, 1500));

        setLottery(prev => ({...prev, phase: 'spin_team'}));
        for(let i=0; i<20; i++) {
          setLottery(prev => ({...prev, team: teams[Math.floor(Math.random()*teams.length)]}));
          await new Promise(r => setTimeout(r, 80 + (i*3)));
        }

        setLottery(prev => ({...prev, phase: 'result', team: actualTeam}));
        await new Promise(r => setTimeout(r, 3500));
        setLottery({ active: false, phase: '', player: null, team: null });

        if (role === 'admin') {
          const newTeams = teams.map(t => t.id === actualTeam.id ? { ...t, players: [...t.players, actualPlayer] } : t);
          const newAvailable = availablePlayers.filter(p => p.id !== actualPlayer.id);
          
          setTeams(newTeams);
          setAvailablePlayers(newAvailable);
          await syncToCloud({ teams: newTeams, availablePlayers: newAvailable });
        }
      };

      const resetDraw = async () => {
        if (!window.confirm("CẢNH BÁO: Hành động này sẽ XÓA TOÀN BỘ KẾT QUẢ ĐÃ LƯU TRÊN CLOUD và làm lại từ đầu. Bạn chắc chắn chứ?")) return;
        const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
        setTeams(newTeams);
        setTeamTurnIndex(0);
        if (role === 'admin') await syncToCloud({ teams: newTeams });
      };

      const handleImportExcel = async () => {
        if (!csvInput.trim()) return;
        const lines = csvInput.split('\n');
        const newPlayers = [];
        
        lines.forEach((line, index) => {
          if (!line.trim()) return;
          const parts = line.split('\t');
          if (parts.length >= 1) {
            let name = parts[0].trim();
            let position = parts.length > 1 ? parts[1].trim() : 'Chưa rõ';
            if(position.toLowerCase().includes('thủ')) position = 'Thủ môn';
            else if(position.toLowerCase().includes('hậu')) position = 'Hậu vệ';
            else if(position.toLowerCase().includes('vệ') && !position.toLowerCase().includes('tiền')) position = 'Hậu vệ';
            else if(position.toLowerCase().includes('tiền vệ')) position = 'Tiền vệ';
            else if(position.toLowerCase().includes('đạo')) position = 'Tiền đạo';
            newPlayers.push({ id: `p-${Date.now()}-${index}`, name, position });
          }
        });

        if (newPlayers.length > 0) {
          setAvailablePlayers(newPlayers);
          setShowSettings(false);
          setCsvInput('');
          const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
          setTeams(newTeams);
          setTeamTurnIndex(0);
          await syncToCloud({ availablePlayers: newPlayers, teams: newTeams });
        }
      };

      const handleTeamNameChange = async (index, value) => {

        newNames[index] = value;
        const newConfig = {...config, teamNames: newNames};
        setConfig(newConfig);
        const newTeams = [...teams];

        setTeams(newTeams);
        await syncToCloud({ config: newConfig, teams: newTeams });
      };

            if (team.players.length === 0) content += `   - Chưa có cầu thủ nào.\n`;
            else team.players.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} - [${p.position}]\n`; });
            content += `\n-----------------------------------\n\n`;
         });
         content += `>> DANH SÁCH CHỜ (Chưa bốc: ${availablePlayers.length})\n`;
         if (availablePlayers.length > 0) availablePlayers.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} - [${p.position}]\n`; });

         const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
         const url = URL.createObjectURL(blob);
         const link = document.createElement('a');
         link.href = url;
         link.download = `Ket_Qua_Draft_${new Date().toISOString().split('T')[0]}.txt`;

         document.body.removeChild(link);

                   <div className="text-slate-500 text-sm text-center mt-10 italic border border-dashed border-slate-700 p-6 rounded-xl bg-slate-800/30">Danh sách trống. <br/><br/>{role === 'admin' ? "Vào Cài đặt -> Nạp dữ liệu từ Excel để bắt đầu!" : "Chờ Admin nạp dữ liệu..."}</div>
                ) : (
                  <div className="overflow-y-auto flex-1 pr-3 space-y-5 custom-scrollbar pb-4">
                    {POSITIONS.map(pos => {
                      const playersInPos = availablePlayers.filter(p => p.position === pos);
                      if (playersInPos.length === 0) return null;
                      return (
                        <div key={pos} className="relative">
                          <div className="sticky top-0 bg-slate-900/90 backdrop-blur-sm z-10 py-2 mb-2 text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center"><div className="w-1.5 h-1.5 rounded-full bg-slate-500 mr-2"></div>{pos} <span className="ml-1 opacity-50">({playersInPos.length})</span></div>
                          <div className="space-y-1.5">
                            {playersInPos.map(p => (
                              <div key={p.id} className={`text-sm py-2 px-3 bg-white/5 border border-white/5 rounded-lg flex justify-between items-center transition-all duration-300 ${lottery.player?.id === p.id && lottery.phase !== '' ? 'bg-amber-500 text-slate-950 font-bold scale-[1.02] shadow-[0_0_20px_rgba(245,158,11,0.4)] border-amber-400' : 'text-slate-300'}`}><span className="truncate">{p.name}</span></div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            <div className="xl:col-span-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 h-full content-start overflow-y-auto custom-scrollbar pr-2 pb-4">

                  {lottery.team?.id === team.id && lottery.phase === 'result' && <div className={`absolute inset-0 opacity-20 bg-gradient-to-br ${team.colorFrom} ${team.colorTo} animate-pulse z-0`}></div>}
                  <div className={`relative z-10 p-4 flex justify-between items-center bg-gradient-to-r ${team.colorFrom} ${team.colorTo} shadow-lg`}>
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 mix-blend-overlay"></div>
                    <h3 className={`font-black text-xl text-white tracking-wide uppercase italic ${team.textGlow} relative z-10`}>{team.name}</h3>
                    <div className="relative z-10 bg-black/40 px-3 py-1 rounded-lg border border-white/20 text-sm font-black text-white flex items-center"><IconUsers size={14} className="mr-1.5 opacity-70" />{team.players.length}<span className="text-white/50 mx-0.5">/</span>{config.maxPlayersPerTeam}</div>

              {lottery.phase === 'result' && <div className="absolute inset-0 pointer-events-none flex justify-center items-center opacity-40"><div className={`w-[900px] h-[900px] rounded-full blur-[120px] bg-gradient-to-tr ${lottery.team?.colorFrom} ${lottery.team?.colorTo}`}></div></div>}
              <h2 className={`text-xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-300 to-white mb-16 tracking-[0.3em] uppercase z-10 relative ${lottery.phase === 'result' ? 'animate-bounce text-amber-400 from-amber-200 to-amber-500 drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'animate-pulse'}`}>{lottery.phase === 'spin_player' ? 'Hệ thống đang lựa chọn' : lottery.phase === 'show_player' ? 'Cầu thủ được chọn' : lottery.phase === 'spin_team' ? 'Tìm kiếm đội bóng' : 'Xác nhận gia nhập'}</h2>

                   {lottery.phase !== 'spin_player' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-amber-400 to-transparent"></div>}
                   <div className="text-amber-400/80 text-sm md:text-lg font-black uppercase tracking-[0.4em] mb-4 flex justify-center items-center">{getPositionIcon(lottery.player?.position || 'Khác')} <span className="ml-3">{lottery.player?.position || 'Vị trí'}</span></div>
                   <div className="text-4xl md:text-8xl font-black text-white uppercase italic tracking-tighter drop-shadow-2xl">{lottery.player?.name || '...'}</div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                      {config.teamNames.map((name, i) => (
                        <div key={i} className="relative"><div className={`absolute top-0 left-0 w-1 h-full rounded-l-xl bg-gradient-to-b ${INITIAL_TEAMS[i].colorFrom} ${INITIAL_TEAMS[i].colorTo}`}></div><input type="text" value={name} onChange={(e) => handleTeamNameChange(i, e.target.value)} placeholder={`Đội ${i+1}`} className="w-full bg-slate-800 border border-white/10 rounded-xl pl-5 pr-3 py-2.5 text-sm font-bold text-white transition-colors focus:border-amber-400 focus:outline-none" /></div>
                      ))}
                    </div>
                  </div>
                  <div className="border-t border-white/10 pt-8"><h3 className="text-lg font-black text-amber-400 uppercase tracking-widest mb-2 flex items-center"><IconUpload className="mr-2" size={18}/> Nạp dữ liệu từ Excel</h3><p className="text-xs text-rose-400 mb-3 font-bold">* Lưu ý: Việc nạp dữ liệu mới sẽ GHI ĐÈ toàn bộ danh sách chờ hiện tại.</p><textarea value={csvInput} onChange={(e) => setCsvInput(e.target.value)} placeholder="Paste 2 cột Excel (Tên, Vị trí) vào đây..." className="w-full h-40 bg-slate-950 border border-white/10 rounded-xl p-4 text-sm font-mono text-slate-300 custom-scrollbar focus:border-amber-400 focus:outline-none" /><button onClick={handleImportExcel} className="mt-4 w-full bg-gradient-to-r from-slate-700 to-slate-600 hover:from-amber-500 hover:to-amber-600 text-white font-black uppercase tracking-widest py-3.5 rounded-xl transition-all shadow-lg">Cập nhật Database</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
