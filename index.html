<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hệ Thống Bốc Thăm UNI LEAGUE</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <style>
    /* Animations & Scrollbar */
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    .animate-fade-in-right { animation: fadeInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    
    /* Chống nảy trang trên Mobile */
    body { overscroll-behavior-y: none; }
  </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 font-sans selection:bg-amber-500/30 overflow-hidden">
  
  <!-- Khu vực hiển thị thông báo nếu bị lỗi copy-paste -->
  <div id="error-screen" style="display: none; color: #f87171; padding: 20px; text-align: center; margin-top: 50px;">
     <h2>Hệ thống gặp lỗi cú pháp do Copy/Paste!</h2>
     <p id="error-msg" class="font-mono text-sm text-yellow-400 mt-4"></p>
     <p style="color: #94a3b8; font-size: 14px; margin-top: 20px;">Bạn đang bị dính ký tự khoảng trắng ẩn. Vui lòng xóa hết code hiện tại, quay lại trang chat và bấm <b>NÚT COPY CODE</b> ở góc trên bên phải khung code để lấy lại mã chuẩn nhé!</p>
  </div>

  <div id="root"></div>

  <script>
     window.onerror = function(msg) {
        document.getElementById('root').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-msg').innerText = "Chi tiết lỗi: " + msg;
     };
  </script>

  <script type="text/babel">

    // --- 1. FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyAuRiEEvbtBmKxoUKGVU2It0otPVlsnomc",
      authDomain: "unileaguedraft.firebaseapp.com",
      projectId: "unileaguedraft",
      storageBucket: "unileaguedraft.firebasestorage.app",
      messagingSenderId: "510674802086",
      appId: "1:510674802086:web:8c03dda96447f3c2d9eb67",
      measurementId: "G-F0VBYWWZSE"
    };

    if (!firebase.apps.length) {
       firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'unidraft-app';

    // --- 2. MOCK DATA ---
    const INITIAL_TEAMS = [
      { id: 1, name: 'Đội 1', colorFrom: 'from-red-600', colorTo: 'to-red-900', shadow: 'shadow-red-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(220,38,38,0.8)]', players: [] },
      { id: 2, name: 'Đội 2', colorFrom: 'from-blue-600', colorTo: 'to-blue-900', shadow: 'shadow-blue-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(37,99,235,0.8)]', players: [] },
      { id: 3, name: 'Đội 3', colorFrom: 'from-emerald-500', colorTo: 'to-emerald-800', shadow: 'shadow-emerald-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(16,185,129,0.8)]', players: [] },
      { id: 4, name: 'Đội 4', colorFrom: 'from-amber-500', colorTo: 'to-amber-800', shadow: 'shadow-amber-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(245,158,11,0.8)]', players: [] },
      { id: 5, name: 'Đội 5', colorFrom: 'from-purple-600', colorTo: 'to-purple-900', shadow: 'shadow-purple-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(147,51,234,0.8)]', players: [] },
      { id: 6, name: 'Đội 6', colorFrom: 'from-pink-600', colorTo: 'to-pink-900', shadow: 'shadow-pink-500/20', textGlow: 'drop-shadow-[0_0_8px_rgba(219,39,119,0.8)]', players: [] },
    ];
    const POSITIONS = ['Thủ môn', 'Hậu vệ', 'Tiền vệ', 'Tiền đạo', 'Khác'];
    const DEFAULT_CONFIG = { maxPlayersPerTeam: 7, teamNames: ['Đội 1', 'Đội 2', 'Đội 3', 'Đội 4', 'Đội 5', 'Đội 6'] };
    const DEFAULT_PASSCODE = "unidraft2024";

    // --- 3. ICONS ---
    const IconShield = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    const IconGoal = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
    const IconFootprints = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 16v-2.38C4 11.5 5.97 9.5 8.38 9.5h7.24C18.03 9.5 20 11.5 20 13.62V16"/><path d="M12 22v-6"/><path d="M8 22v-6"/><path d="M16 22v-6"/><path d="M8 2a3 3 0 0 0-3 3"/><path d="M16 2a3 3 0 0 1 3 3"/></svg>;
    const IconUsers = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconTrophy = ({ className, size=24, strokeWidth=2 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconLock = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const IconMonitorPlay = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 8 6 4-6 4Z"/></svg>;
    const IconSmartphone = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const IconKeyRound = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>;
    const IconCloudOff = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.27"/></svg>;
    const IconRotateCcw = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconCheckCircle = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconQrCode = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>;
    const IconSettings = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconDices = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>;
    const IconHexagon = ({ className, size=16, opacity }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={{opacity}}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>;
    const IconChevronRight = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const IconX = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const IconUpload = ({ className, size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const IconDownload = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    const getPositionIcon = (pos) => {
      switch(pos) {
        case 'Thủ môn': return <IconShield className="text-amber-400" size={14} />;
        case 'Hậu vệ': return <IconShield className="text-blue-400" size={14} />;
        case 'Tiền vệ': return <IconFootprints className="text-emerald-400" size={14} />;
        case 'Tiền đạo': return <IconGoal className="text-rose-400" size={14} />;
        default: return <IconUsers className="text-slate-400" size={14} />;
      }
    };
    
    const getPositionColor = (pos) => {
      switch(pos) {
        case 'Thủ môn': return 'bg-amber-400/10 text-amber-400 border-amber-400/20';
        case 'Hậu vệ': return 'bg-blue-400/10 text-blue-400 border-blue-400/20';
        case 'Tiền vệ': return 'bg-emerald-400/10 text-emerald-400 border-emerald-400/20';
        case 'Tiền đạo': return 'bg-rose-400/10 text-rose-400 border-rose-400/20';
        default: return 'bg-slate-400/10 text-slate-400 border-slate-400/20';
      }
    };

    const { useState, useEffect, useRef } = React;

    // --- 4. MAIN APP COMPONENT ---
    function App() {
      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(false);
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passcodeInput, setPasscodeInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [currentPasscode, setCurrentPasscode] = useState(DEFAULT_PASSCODE);

      useEffect(() => {
        auth.signInAnonymously()
          .catch((error) => {
            console.error("Auth error:", error);
            setDbError(true);
          });
        const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_security');
        const unsub = docRef.onSnapshot((snap) => {
          if (snap.exists && snap.data().passcode) setCurrentPasscode(snap.data().passcode);
        }, (err) => console.log(err));
        return () => unsub();
      }, [user, dbError]);

      const verifyPasscode = () => {
        if (passcodeInput === currentPasscode) {
          setShowAuthModal(false); setRole('admin'); setPasscodeInput(''); setAuthError('');
        } else { setAuthError('Mật khẩu không chính xác!'); }
      };

      if (!role) {
        return (
          <div className="fixed inset-0 bg-[#0a0f1c] flex items-center justify-center p-4 md:p-6 relative overflow-hidden font-sans">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-500/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none z-0 transform-gpu"></div>
            
            <div className="bg-slate-900/80 backdrop-blur-md md:backdrop-blur-xl border border-white/10 p-6 md:p-10 rounded-3xl shadow-2xl z-10 max-w-2xl w-full text-center">
              <div className="flex justify-center mb-6">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-amber-700 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.4)]">
                  <IconTrophy className="text-slate-950" size={36} />
                </div>
              </div>
              <h1 className="text-2xl md:text-4xl font-black text-white uppercase tracking-wider mb-2">Hệ Thống Draft</h1>
              <p className="text-xs md:text-sm text-slate-400 mb-8">Vui lòng chọn vai trò để truy cập UNI LEAGUE</p>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 relative">
                <button onClick={() => setShowAuthModal(true)} className="group relative bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-amber-500/50 hover:shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                  <div className="absolute top-4 right-4 bg-slate-900 p-1.5 rounded-md border border-white/10 text-amber-500/50"><IconLock size={14} /></div>
                  <IconMonitorPlay size={40} className="text-amber-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Màn hình Livestream</h2>
                  <p className="text-xs text-slate-400 text-center">Phòng dành cho MC và Quản trị viên</p>
                </button>

                <button onClick={() => setRole('viewer')} className="group bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                  <IconSmartphone size={40} className="text-blue-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Khán giả theo dõi</h2>
                  <p className="text-xs text-slate-400 text-center">Xem kết quả bốc thăm trên thiết bị cá nhân</p>
                </button>
              </div>
              {dbError && <p className="text-red-400 mt-6 text-xs font-bold bg-red-900/20 p-3 rounded-lg border border-red-500/20"><IconCloudOff size={14} className="inline mr-2"/> Database chưa kết nối. Vui lòng kiểm tra lại mạng!</p>}
            </div>

            {showAuthModal && (
              <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                  <div className="flex justify-center mb-4"><div className="bg-amber-500/10 p-4 rounded-full border border-amber-500/20"><IconKeyRound className="text-amber-400" size={32} /></div></div>
                  <h3 className="text-xl font-black text-white uppercase tracking-widest mb-1">Xác thực Admin</h3>
                  <p className="text-xs text-slate-400 mb-6">Nhập mã PIN để truy cập bảng điều khiển.</p>
                  <input type="password" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && verifyPasscode()}
                    placeholder="Nhập Passcode..." className="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-center font-black tracking-widest text-amber-400 mb-2 focus:outline-none focus:border-amber-500 transition-colors" autoFocus />
                  {authError && <p className="text-rose-500 text-xs font-bold mb-4">{authError}</p>}
                  <div className="flex space-x-3 mt-6">
                    <button onClick={() => {setShowAuthModal(false); setAuthError(''); setPasscodeInput('');}} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition">Hủy</button>
                    <button onClick={verifyPasscode} className="flex-1 py-3 bg-gradient-to-r from-amber-500 to-amber-600 text-slate-950 font-black rounded-xl transition shadow-lg">Xác nhận</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return <DraftApplication role={role} user={user} dbError={dbError} onBack={() => setRole(null)} currentPasscode={currentPasscode} />;
    }

    // --- 5. COMPONENT HỆ THỐNG DRAFT ---
    function DraftApplication({ role, user, dbError, onBack, currentPasscode }) {
      const [teams, setTeams] = useState(INITIAL_TEAMS);
      const [availablePlayers, setAvailablePlayers] = useState([]);
      const [config, setConfig] = useState(DEFAULT_CONFIG);
      const [lottery, setLottery] = useState({ active: false, phase: '', player: null, team: null });
      const [showSettings, setShowSettings] = useState(false);
      const [csvInput, setCsvInput] = useState('');
      const [newPasscode, setNewPasscode] = useState(currentPasscode);
      const [syncStatus, setSyncStatus] = useState('saved');
      
      const lastProcessedCmdId = useRef(null);
      const isFirstLoad = useRef(true);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_main');
        
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            
            // Lấy dữ liệu mới nhất từ Firebase (Giải quyết triệt để lỗi mất dữ liệu khi quay xong)
            const currentTeams = data.teams || INITIAL_TEAMS;
            const currentAvailable = data.availablePlayers || [];

            if (isFirstLoad.current) {
               isFirstLoad.current = false;
               if (data.lotteryCmd) lastProcessedCmdId.current = data.lotteryCmd.id;
            }

            setTeams(currentTeams);
            setAvailablePlayers(currentAvailable);
            if (data.config) setConfig(data.config);
            
            if (data.lotteryCmd && data.lotteryCmd.id !== lastProcessedCmdId.current) {
              lastProcessedCmdId.current = data.lotteryCmd.id;
              // Truyền luôn danh sách mới nhất vào hiệu ứng bốc thăm
              playLotteryAnimation(data.lotteryCmd.player, data.lotteryCmd.team, currentTeams, currentAvailable);
            }
          } else if (role === 'admin') {
             docRef.set({ teams: INITIAL_TEAMS, availablePlayers: [], config: DEFAULT_CONFIG, lotteryCmd: null }, { merge: true });
             isFirstLoad.current = false;
          }
        }, (err) => console.error("Snapshot error:", err));

        return () => unsubscribe();
      }, [user, role, dbError]);

      const syncToCloud = async (updates) => {
        if (user && !dbError) {
          setSyncStatus('saving');
          const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_main');
          await docRef.set(updates, { merge: true });
          setTimeout(() => setSyncStatus('saved'), 500); 
        }
      };

      const savePasscodeToCloud = async (newPass) => {
        if (user && !dbError && newPass.trim() !== '') {
          const docRef = db.collection('artifacts').doc(appId).collection('public').doc('unidraft_security');
          await docRef.set({ passcode: newPass }, { merge: true });
          alert("Đã lưu Passcode mới thành công!");
        }
      };

      const triggerNextDraw = async () => {
        if (availablePlayers.length === 0 || lottery.active) return;
        
        const actualPlayer = availablePlayers[Math.floor(Math.random() * availablePlayers.length)];
        const minPlayersCount = Math.min(...teams.map(t => t.players.length));
        const eligibleTeams = teams.filter(t => t.players.length === minPlayersCount && t.players.length < config.maxPlayersPerTeam);
        
        if (eligibleTeams.length === 0) {
           alert("Tất cả các đội bóng đã đủ người!");
           return;
        }

        const actualTeam = eligibleTeams[Math.floor(Math.random() * eligibleTeams.length)];
        const cmdId = Date.now().toString();
        await syncToCloud({ lotteryCmd: { id: cmdId, player: actualPlayer, team: actualTeam } });
      };

      // Đã thêm 2 tham số currentTeams, currentAvailable vào để hệ thống không bị "Mất trí nhớ"
      const playLotteryAnimation = async (actualPlayer, actualTeam, currentTeams, currentAvailable) => {
        setLottery({ active: true, phase: 'spin_player', player: null, team: null });
        const pool = currentAvailable.length > 0 ? currentAvailable : [actualPlayer];

        for(let i=0; i<25; i++) {
          setLottery(prev => ({...prev, player: pool[Math.floor(Math.random()*pool.length)]}));
          await new Promise(r => setTimeout(r, 60 + (i*2)));
        }
        
        setLottery(prev => ({...prev, phase: 'show_player', player: actualPlayer}));
        await new Promise(r => setTimeout(r, 1500));

        setLottery(prev => ({...prev, phase: 'spin_team'}));
        for(let i=0; i<20; i++) {
          setLottery(prev => ({...prev, team: currentTeams[Math.floor(Math.random()*currentTeams.length)]}));
          await new Promise(r => setTimeout(r, 80 + (i*3)));
        }

        setLottery(prev => ({...prev, phase: 'result', team: actualTeam}));
        await new Promise(r => setTimeout(r, 3500));
        setLottery({ active: false, phase: '', player: null, team: null });

        if (role === 'admin') {
          // Lấy danh sách MỚI NHẤT để tính toán thay vì danh sách Trống lúc mới tải trang
          const newTeams = currentTeams.map(t => t.id === actualTeam.id ? { ...t, players: [...t.players, actualPlayer] } : t);
          const newAvailable = currentAvailable.filter(p => p.id !== actualPlayer.id);
          
          setTeams(newTeams);
          setAvailablePlayers(newAvailable);
          await syncToCloud({ teams: newTeams, availablePlayers: newAvailable });
        }
      };

      const resetDraw = async () => {
        if (!window.confirm("CẢNH BÁO: Hành động này sẽ XÓA TOÀN BỘ KẾT QUẢ và làm lại từ đầu. Chắc chắn chứ?")) return;
        const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
        setTeams(newTeams);
        if (role === 'admin') await syncToCloud({ teams: newTeams, availablePlayers: [] });
      };

      const handleImportExcel = async () => {
        if (!csvInput.trim()) return;
        const lines = csvInput.split('\n');
        const newPlayers = [];
        
        lines.forEach((line, index) => {
          if (!line.trim()) return;
          
          let separator = line.includes('\t') ? '\t' : ',';
          const parts = line.split(separator).map(p => p.trim());
          
          if (parts.length >= 2) {
             let namePart = "";
             let posPart = "";
             
             if (!isNaN(parts[0]) || parts[0].toLowerCase() === 'stt') {
                if (parts[0].toLowerCase() === 'stt') return;
                namePart = parts[1];
                posPart = parts[2] || 'Khác';
             } else {
                if (parts[0].toLowerCase().includes('tên')) return;
                namePart = parts[0];
                posPart = parts[1] || 'Khác';
             }

             let name = namePart;
             let position = posPart;

             if(position.toLowerCase().includes('thủ')) position = 'Thủ môn';
             else if(position.toLowerCase().includes('hậu')) position = 'Hậu vệ';
             else if(position.toLowerCase().includes('vệ') && !position.toLowerCase().includes('tiền')) position = 'Hậu vệ';
             else if(position.toLowerCase().includes('tiền vệ')) position = 'Tiền vệ';
             else if(position.toLowerCase().includes('đạo')) position = 'Tiền đạo';
             else position = 'Khác';

             if (name) {
                newPlayers.push({ id: `p-${Date.now()}-${index}`, name, position });
             }
          }
        });

        if (newPlayers.length > 0) {
          setAvailablePlayers(newPlayers);
          setShowSettings(false);
          setCsvInput('');
          const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
          setTeams(newTeams);
          await syncToCloud({ availablePlayers: newPlayers, teams: newTeams });
        } else {
          alert("Không nhận diện được cầu thủ nào. Bạn hãy copy đúng 2 cột (Tên, Vị trí) hoặc 3 cột (STT, Tên, Vị trí) từ Excel nhé!");
        }
      };

      const handleTeamNameChange = async (index, value) => {
        const newNames = [...config.teamNames];
        newNames[index] = value;
        const newConfig = {...config, teamNames: newNames};
        setConfig(newConfig);
        const newTeams = [...teams];
        newTeams[index].name = value;
        setTeams(newTeams);
        await syncToCloud({ config: newConfig, teams: newTeams });
      };

      const handleExportData = () => {
         let content = "=== KẾT QUẢ BỐC THĂM UNI LEAGUE ===\n\n";
         teams.forEach(team => {
            content += `>> ${team.name.toUpperCase()} (${team.players.length}/${config.maxPlayersPerTeam} cầu thủ)\n`;
            if (team.players.length === 0) content += `   - Chưa có cầu thủ nào.\n`;
            else team.players.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} - [${p.position}]\n`; });
            content += `\n-----------------------------------\n\n`;
         });
         content += `>> DANH SÁCH CHỜ (Chưa bốc: ${availablePlayers.length})\n`;
         if (availablePlayers.length > 0) availablePlayers.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} - [${p.position}]\n`; });

         const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
         const url = URL.createObjectURL(blob);
         const link = document.createElement('a');
         link.href = url;
         link.download = `Ket_Qua_Draft_${new Date().toISOString().split('T')[0]}.txt`;
         document.body.appendChild(link);
         link.click();
         document.body.removeChild(link);
      };

      const totalDrafted = teams.reduce((sum, t) => sum + t.players.length, 0);
      const totalPlayers = availablePlayers.length + totalDrafted;

      return (
        <div className="fixed inset-0 flex flex-col bg-[#0a0f1c]">
          <div className="absolute inset-0 z-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'linear-gradient(to right, #ffffff05 1px, transparent 1px), linear-gradient(to bottom, #ffffff05 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-blue-600/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none z-0 transform-gpu"></div>

          {/* HEADER */}
          <header className="relative z-20 bg-slate-900/80 backdrop-blur-md border-b border-white/5 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-lg flex-shrink-0">
            <div className="flex items-center space-x-3 md:space-x-4">
              <div className="relative cursor-pointer group" onClick={onBack} title="Quay lại chọn Role">
                <div className="absolute inset-0 bg-amber-400 blur-md opacity-30 rounded-full group-hover:animate-ping"></div>
                <div className="relative w-10 h-10 md:w-12 md:h-12 bg-gradient-to-br from-amber-300 via-amber-500 to-amber-700 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(245,158,11,0.2)] border border-amber-200/50 transform rotate-3">
                  <IconTrophy className="text-slate-950" size={24} strokeWidth={2.5} />
                </div>
              </div>
              <div>
                <h1 className="text-xl md:text-3xl font-black tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 drop-shadow-lg">UNI LEAGUE</h1>
                <div className="flex items-center space-x-2 text-[10px] md:text-xs font-semibold tracking-widest text-slate-400 uppercase mt-0.5">
                  <span className={`w-2 h-2 rounded-full animate-pulse ${role === 'admin' ? 'bg-red-500' : 'bg-emerald-500'}`}></span>
                  <span className="hidden sm:inline">{role === 'admin' ? 'Live Admin Dashboard' : 'Live Viewer Mode'}</span>
                  <span className="sm:hidden">{role === 'admin' ? 'Admin' : 'Viewer'}</span>
                </div>
              </div>
            </div>

            <div className="flex space-x-2 md:space-x-3 items-center">
              {role === 'admin' && !dbError && (
                 <div className="hidden lg:flex items-center space-x-2 mr-2 px-3 py-1.5 rounded-lg bg-slate-800/50 border border-white/5">
                    {syncStatus === 'saving' ? (
                       <><IconRotateCcw size={14} className="text-amber-400 animate-spin" /><span className="text-[10px] text-amber-400 uppercase tracking-widest font-bold">Đang lưu...</span></>
                    ) : (
                       <><IconCheckCircle size={14} className="text-emerald-400" /><span className="text-[10px] text-emerald-400 uppercase tracking-widest font-bold">Đã lưu</span></>
                    )}
                 </div>
              )}
              <div className="text-right mr-2 md:mr-4 hidden sm:block bg-slate-800/50 px-3 py-1.5 md:px-4 md:py-2 rounded-lg border border-white/5">
                <div className="text-[9px] md:text-[10px] text-slate-400 uppercase tracking-wider font-bold mb-0.5">Tình trạng</div>
                <div className="font-black text-amber-400 text-sm md:text-base">{totalDrafted} <span className="text-slate-500 font-medium">/ {totalPlayers}</span></div>
              </div>
              
              {role === 'admin' && (
                <>
                  <button onClick={() => alert("Hãy gửi link này cho mọi người xem!")} className="p-2 md:p-2.5 bg-slate-800 hover:bg-slate-700 text-blue-400 rounded-lg transition border border-white/5 group hidden sm:block"><IconQrCode size={16} className="group-hover:scale-110 transition-transform" /></button>
                  <button onClick={() => setShowSettings(true)} disabled={lottery.active} className="p-2 md:p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition disabled:opacity-50 border border-white/5"><IconSettings size={18} /></button>
                  <button onClick={triggerNextDraw} disabled={lottery.active || availablePlayers.length === 0}
                    className={`relative group overflow-hidden flex items-center space-x-2 px-4 py-2 md:px-8 md:py-3 rounded-xl font-black uppercase tracking-widest transition-all duration-300 text-sm md:text-base
                      ${lottery.active || availablePlayers.length === 0 ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-white/5' : 'bg-gradient-to-r from-amber-400 to-amber-600 hover:from-amber-300 hover:to-amber-500 text-slate-950 shadow-[0_0_20px_rgba(245,158,11,0.3)]'}`}>
                    <IconDices size={18} className={(!lottery.active && availablePlayers.length > 0) ? "animate-bounce hidden sm:block" : "hidden sm:block"} />
                    <span className="relative z-10">{lottery.active ? 'WAIT' : availablePlayers.length === 0 ? 'TRỐNG' : 'NEXT'}</span>
                  </button>
                </>
              )}
              {role === 'viewer' && (
                <div className="bg-emerald-500/10 border border-emerald-500/30 px-3 py-1.5 md:px-4 md:py-2 rounded-xl flex items-center text-emerald-400 text-xs md:text-sm font-bold animate-pulse shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                   <IconMonitorPlay size={14} className="mr-1 md:mr-2" /> Live
                </div>
              )}
            </div>
          </header>

          <main className="flex-1 p-3 md:p-6 flex flex-col xl:flex-row gap-4 md:gap-6 relative z-10 overflow-y-auto xl:overflow-hidden custom-scrollbar">
            
            {/* CỘT DANH SÁCH CHỜ */}
            <div className="w-full xl:w-[320px] 2xl:w-[360px] flex flex-col h-[300px] xl:h-full flex-shrink-0">
              <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-white/10 p-4 flex-1 flex flex-col shadow-lg relative overflow-hidden">
                <div className="absolute top-0 right-0 w-24 h-24 bg-amber-500/5 blur-[40px] rounded-full transform-gpu"></div>
                <h2 className="text-xs md:text-sm font-black text-white uppercase tracking-widest mb-3 flex items-center border-b border-white/10 pb-3">
                  <IconHexagon className="mr-2 text-amber-400" size={14} opacity={0.2} /> Danh sách chờ
                  <span className="ml-auto bg-amber-500/20 text-amber-400 px-2.5 py-0.5 rounded-full text-[10px] md:text-xs">{availablePlayers.length}</span>
                </h2>
                {availablePlayers.length === 0 ? (
                   <div className="text-slate-500 text-xs md:text-sm text-center mt-6 md:mt-10 italic border border-dashed border-slate-700/50 p-4 rounded-xl bg-slate-800/20">Trống. <br/>{role === 'admin' ? "Nạp dữ liệu từ Cài đặt!" : "Chờ nạp..."}</div>
                ) : (
                  <div className="overflow-y-auto flex-1 pr-2 space-y-4 custom-scrollbar pb-2">
                    {POSITIONS.map(pos => {
                      const playersInPos = availablePlayers.filter(p => p.position === pos);
                      if (playersInPos.length === 0) return null;
                      return (
                        <div key={pos} className="relative">
                          <div className="sticky top-0 bg-slate-900/95 backdrop-blur-sm z-10 py-1.5 mb-2 text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center"><div className="w-1.5 h-1.5 rounded-full bg-slate-500 mr-2"></div>{pos} <span className="ml-1 opacity-50">({playersInPos.length})</span></div>
                          <div className="space-y-1.5">
                            {playersInPos.map(p => (
                              <div key={p.id} className={`text-xs md:text-sm py-2 px-3 bg-white/5 border border-white/5 rounded-lg flex justify-between items-center transition-all duration-300 ${lottery.player?.id === p.id && lottery.phase !== '' ? 'bg-amber-500 text-slate-950 font-bold scale-[1.02] shadow-[0_0_15px_rgba(245,158,11,0.4)] border-amber-400' : 'text-slate-300'}`}><span className="truncate">{p.name}</span></div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            {/* CỘT CÁC ĐỘI BÓNG */}
            <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 content-start xl:overflow-y-auto custom-scrollbar xl:pr-2 pb-10 xl:pb-4">
              {teams.map((team) => (
                <div key={team.id} className={`bg-slate-900/60 backdrop-blur-md rounded-2xl border border-white/10 flex flex-col h-[320px] md:h-[340px] relative overflow-hidden transition-all duration-500 ${lottery.team?.id === team.id && lottery.phase === 'result' ? 'ring-2 ring-white scale-[1.02] shadow-xl z-20' : team.shadow}`}>
                  {lottery.team?.id === team.id && lottery.phase === 'result' && <div className={`absolute inset-0 opacity-20 bg-gradient-to-br ${team.colorFrom} ${team.colorTo} animate-pulse z-0 transform-gpu`}></div>}
                  <div className={`relative z-10 p-3 md:p-4 flex justify-between items-center bg-gradient-to-r ${team.colorFrom} ${team.colorTo} shadow-md`}>
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10 mix-blend-overlay pointer-events-none"></div>
                    <h3 className={`font-black text-lg md:text-xl text-white tracking-wide uppercase italic ${team.textGlow} relative z-10`}>{team.name}</h3>
                    <div className="relative z-10 bg-black/40 px-2.5 py-1 rounded-lg border border-white/20 text-xs md:text-sm font-black text-white flex items-center"><IconUsers size={12} className="mr-1 md:mr-1.5 opacity-70" />{team.players.length}<span className="text-white/50 mx-0.5">/</span>{config.maxPlayersPerTeam}</div>
                  </div>
                  <div className="p-2.5 md:p-3 flex-1 flex flex-col space-y-2 overflow-y-auto custom-scrollbar relative z-10">
                    {team.players.map((p, i) => (
                      <div key={p.id} className="group relative flex items-center bg-slate-800/50 border border-white/5 p-2 md:p-2.5 rounded-xl animate-fade-in-right">
                        <div className="w-6 md:w-8 text-center text-slate-500/50 text-base md:text-xl font-black italic mr-2 md:mr-3">{(i + 1).toString().padStart(2, '0')}</div>
                        <div className="flex-1 font-bold text-slate-200 text-sm md:text-[15px] truncate mr-2">{p.name}</div>
                        <div className={`text-[9px] md:text-[10px] px-1.5 py-0.5 md:px-2 md:py-1 rounded-md border flex items-center font-bold tracking-wider uppercase ${getPositionColor(p.position)}`}>{p.position}</div>
                      </div>
                    ))}
                    {Array.from({ length: Math.max(0, config.maxPlayersPerTeam - team.players.length) }).map((_, i) => (
                      <div key={`empty-${i}`} className="flex items-center bg-slate-800/20 border border-dashed border-white/10 p-2 md:p-2.5 rounded-xl opacity-40"><div className="w-6 md:w-8 text-center text-slate-700 text-base md:text-xl font-black italic mr-2 md:mr-3">{(team.players.length + i + 1).toString().padStart(2, '0')}</div><div className="flex-1 text-slate-600 text-xs md:text-sm italic font-medium">Trống...</div></div>

                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* OVERLAY XỔ SỐ */}
          {lottery.active && (

              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150vw] h-[30vh] md:w-[120vw] md:h-[20vh] bg-amber-500/10 blur-[80px] md:blur-[100px] -rotate-12 animate-pulse transform-gpu"></div>

              {lottery.phase === 'result' && <div className="absolute inset-0 flex justify-center items-center opacity-30"><div className={`w-[600px] h-[600px] md:w-[900px] md:h-[900px] rounded-full blur-[100px] md:blur-[120px] bg-gradient-to-tr ${lottery.team?.colorFrom} ${lottery.team?.colorTo} transform-gpu`}></div></div>}

              <h2 className={`text-lg md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-300 to-white mb-10 md:mb-16 tracking-[0.2em] md:tracking-[0.3em] uppercase z-10 relative text-center px-4 ${lottery.phase === 'result' ? 'animate-bounce text-amber-400 from-amber-200 to-amber-500 drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'animate-pulse'}`}>{lottery.phase === 'spin_player' ? 'Đang lựa chọn' : lottery.phase === 'show_player' ? 'Cầu thủ được chọn' : lottery.phase === 'spin_team' ? 'Tìm đội bóng' : 'Xác nhận gia nhập'}</h2>

              <div className="relative z-10 w-full max-w-4xl flex flex-col items-center">

                   {lottery.phase !== 'spin_player' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-amber-400 to-transparent"></div>}
                   <div className="text-amber-400/80 text-xs md:text-lg font-black uppercase tracking-[0.3em] md:tracking-[0.4em] mb-3 md:mb-4 flex justify-center items-center">{getPositionIcon(lottery.player?.position || 'Khác')} <span className="ml-2 md:ml-3">{lottery.player?.position || 'Vị trí'}</span></div>

                    <div className={`relative rounded-3xl p-6 md:p-14 w-full text-center transform transition-all duration-700 border-2 overflow-hidden ${lottery.phase === 'result' ? `scale-[1.05] md:scale-110 shadow-[0_0_50px_rgba(255,255,255,0.15)] border-white/50 bg-gradient-to-br ${lottery.team?.colorFrom} ${lottery.team?.colorTo}` : 'border-white/10 bg-slate-800'}`}>
                      {lottery.phase === 'result' && <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 mix-blend-overlay"></div>}
                      <div className={`text-3xl sm:text-5xl md:text-8xl font-black uppercase italic tracking-tighter relative z-10 ${lottery.phase === 'result' ? 'text-white drop-shadow-xl' : 'text-slate-500'}`}>{lottery.team?.name || '???'}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* MODAL CÀI ĐẶT */}
          {showSettings && role === 'admin' && (
            <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-[110] p-3 md:p-4 font-sans">
              <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[95vh] md:max-h-[90vh]">
                <div className="p-4 md:p-5 border-b border-white/10 flex justify-between items-center bg-slate-800/80"><h2 className="text-lg md:text-xl font-black tracking-widest uppercase flex items-center text-white"><IconSettings className="mr-2 md:mr-3 text-amber-400" size={18} /> Cài đặt</h2><button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white transition-colors bg-white/5 p-1.5 md:p-2 rounded-lg"><IconX size={18} /></button></div>
                <div className="p-4 md:p-6 overflow-y-auto space-y-6 md:space-y-8 custom-scrollbar">
                  <div className="flex space-x-3 md:space-x-4">
                     <button onClick={handleExportData} className="flex-1 bg-emerald-600/20 hover:bg-emerald-600/40 border border-emerald-500/30 text-emerald-400 rounded-xl p-3 md:p-4 flex flex-col items-center justify-center transition-all group"><IconDownload size={20} className="mb-1 md:mb-2 group-hover:scale-110 transition-transform"/><span className="font-bold text-[10px] md:text-sm uppercase tracking-widest">Xuất File (.TXT)</span></button>
                     <button onClick={resetDraw} className="flex-1 bg-rose-600/20 hover:bg-rose-600/40 border border-rose-500/30 text-rose-400 rounded-xl p-3 md:p-4 flex flex-col items-center justify-center transition-all group"><IconRotateCcw size={20} className="mb-1 md:mb-2 group-hover:-rotate-180 transition-transform duration-500"/><span className="font-bold text-[10px] md:text-sm uppercase tracking-widest">Làm lại từ đầu</span></button>
                  </div>
                  <div className="bg-slate-800 border border-white/10 rounded-xl p-3 md:p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                     <div><h4 className="text-white font-bold text-sm flex items-center"><IconKeyRound size={14} className="mr-2 text-amber-400"/> Đổi mật khẩu</h4><p className="text-[10px] md:text-xs text-slate-500 mt-1">Pass hiện tại để vào phòng Admin</p></div>
                     <div className="flex space-x-2"><input type="text" value={newPasscode} onChange={(e) => setNewPasscode(e.target.value)} className="bg-slate-950 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-white w-full sm:w-32 focus:border-amber-400 focus:outline-none" /><button onClick={() => savePasscodeToCloud(newPasscode)} className="bg-slate-700 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition">Lưu</button></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4 md:gap-6"><div><label className="block text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Số lượng / Đội</label><select value={config.maxPlayersPerTeam} onChange={async (e) => { const v = parseInt(e.target.value); setConfig({...config, maxPlayersPerTeam: v}); await syncToCloud({ config: {...config, maxPlayersPerTeam: v} }); }} className="w-full bg-slate-800 border border-white/10 rounded-xl px-3 md:px-4 py-2.5 md:py-3 text-sm md:text-base text-white font-bold transition-colors">{[5,6,7,8,9,10,11,15,20].map(n => <option key={n} value={n}>{n} Người</option>)}</select></div></div>
                  <div>
                    <label className="block text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 md:mb-3">Tên đội bóng</label>
                    <div className="grid grid-cols-2 gap-3 md:gap-4">
                      {config.teamNames.map((name, i) => (
                        <div key={i} className="relative"><div className={`absolute top-0 left-0 w-1 h-full rounded-l-xl bg-gradient-to-b ${INITIAL_TEAMS[i].colorFrom} ${INITIAL_TEAMS[i].colorTo}`}></div><input type="text" value={name} onChange={(e) => handleTeamNameChange(i, e.target.value)} placeholder={`Đội ${i+1}`} className="w-full bg-slate-800 border border-white/10 rounded-xl pl-4 md:pl-5 pr-2 md:pr-3 py-2 md:py-2.5 text-xs md:text-sm font-bold text-white transition-colors focus:border-amber-400 focus:outline-none" /></div>
                      ))}
                    </div>
                  </div>
                  <div className="border-t border-white/10 pt-6 md:pt-8"><h3 className="text-base md:text-lg font-black text-amber-400 uppercase tracking-widest mb-1 md:mb-2 flex items-center"><IconUpload className="mr-2" size={16}/> Nạp dữ liệu Excel/CSV</h3><p className="text-[10px] md:text-xs text-rose-400 mb-3 font-bold">* Tự động bỏ qua số STT, nhận chuẩn file CSV/Excel</p><textarea value={csvInput} onChange={(e) => setCsvInput(e.target.value)} placeholder="Copy 2 cột (Tên, Vị trí) hoặc 3 cột (STT, Tên, Vị trí) dán vào đây..." className="w-full h-32 md:h-40 bg-slate-950 border border-white/10 rounded-xl p-3 md:p-4 text-xs md:text-sm font-mono text-slate-300 custom-scrollbar focus:border-amber-400 focus:outline-none" /><button onClick={handleImportExcel} className="mt-3 md:mt-4 w-full bg-gradient-to-r from-slate-700 to-slate-600 hover:from-amber-500 hover:to-amber-600 text-white font-black uppercase tracking-widest py-3 md:py-3.5 rounded-xl transition-all shadow-lg text-sm md:text-base">Cập nhật Database</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
