<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNI LEAGUE - Lịch Thi Đấu & Kết Quả</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Thêm thư viện html2canvas để xuất file ảnh -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <style>
    /* Animations & Scrollbar */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    
    body { overscroll-behavior-y: none; }
    
    /* Input Number ẩn mũi tên */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 font-sans selection:bg-amber-500/30 overflow-hidden flex flex-col h-screen">
  
  <div id="error-screen" style="display: none; color: #f87171; padding: 20px; text-align: center; margin-top: 50px;">
     <h2>Hệ thống gặp lỗi cú pháp do Copy/Paste!</h2>
     <p id="error-msg" class="font-mono text-sm text-yellow-400 mt-4"></p>
  </div>

  <div id="root" class="h-full flex flex-col"></div>

  <script>
     window.onerror = function(msg) {
        document.getElementById('root').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-msg').innerText = "Chi tiết lỗi: " + msg;
     };
  </script>

  <script type="text/babel">

    // --- 1. FIREBASE CONFIGURATION ---
    let firebaseConfig = {};
    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = JSON.parse(__firebase_config);
      } else {
        firebaseConfig = {
          apiKey: "AIzaSyAuRiEEvbtBmKxoUKGVU2It0otPVlsnomc",
          authDomain: "unileaguedraft.firebaseapp.com",
          projectId: "unileaguedraft",
          storageBucket: "unileaguedraft.firebasestorage.app",
          messagingSenderId: "510674802086",
          appId: "1:510674802086:web:8c03dda96447f3c2d9eb67",
          measurementId: "G-F0VBYWWZSE"
        };
      }
    } catch(e) {
      console.error("Firebase config error:", e);
    }

    if (!firebase.apps.length) {
       firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'unidraft-app';

    const getMainDocRef = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('unidraft').doc('main');
    const getSecurityDocRef = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('unidraft').doc('security');

    // --- 2. ICONS ---
    const IconTrophy = ({ className, size=24, strokeWidth=2 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconLock = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const IconMonitorPlay = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 8 6 4-6 4Z"/></svg>;
    const IconSmartphone = ({ className, size=48 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const IconKeyRound = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>;
    const IconCloudOff = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.27"/></svg>;
    const IconRotateCcw = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconCheckCircle = ({ className, size=14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconSwords = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l2-2"/><path d="M14.5 6.5L18 3h3v3l-3.5 3.5"/><path d="M10.5 14.5L5 20l-2-2 5.5-5.5"/></svg>;
    const IconCalendar = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>;
    const IconArrowUp = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"/></svg>;
    const IconArrowDown = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
    const IconWand = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h0"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/></svg>;
    const IconDownload = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconCamera = ({ className, size=16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;

    const { useState, useEffect } = React;

    // --- 3. MAIN APP ---
    function App() {
      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(false);
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passcodeInput, setPasscodeInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [currentPasscode, setCurrentPasscode] = useState("unidraft2024");

      useEffect(() => {
        const doAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Auth error:", error);
            setDbError(true);
          }
        };
        doAuth();

        const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = getSecurityDocRef();
        const unsub = docRef.onSnapshot((snap) => {
          if (snap.exists && snap.data().passcode) setCurrentPasscode(snap.data().passcode);
        }, (err) => console.log(err));
        return () => unsub();
      }, [user, dbError]);

      const verifyPasscode = () => {
        if (passcodeInput === currentPasscode) {
          setShowAuthModal(false); setRole('admin'); setPasscodeInput(''); setAuthError('');
        } else { setAuthError('Mật khẩu không chính xác!'); }
      };

      if (!role) {
        return (
          <div className="flex-1 flex items-center justify-center p-4 md:p-6 relative overflow-hidden font-sans">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-500/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none z-0 transform-gpu"></div>
            
            <div className="bg-slate-900/80 backdrop-blur-md md:backdrop-blur-xl border border-white/10 p-6 md:p-10 rounded-3xl shadow-2xl z-10 max-w-2xl w-full text-center">
              <div className="flex justify-center mb-6">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-amber-700 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.4)]">
                  <IconCalendar className="text-slate-950" size={36} />
                </div>
              </div>
              <h1 className="text-2xl md:text-4xl font-black text-white uppercase tracking-wider mb-2">Lịch Thi Đấu & Kết Quả</h1>
              <p className="text-xs md:text-sm text-slate-400 mb-8">Vui lòng chọn vai trò để truy cập bảng điều khiển UNI LEAGUE</p>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 relative">
                <button onClick={() => setShowAuthModal(true)} className="group relative bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-amber-500/50 hover:shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                  <div className="absolute top-4 right-4 bg-slate-900 p-1.5 rounded-md border border-white/10 text-amber-500/50"><IconLock size={14} /></div>
                  <IconMonitorPlay size={40} className="text-amber-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Quản Trị Viên</h2>
                  <p className="text-xs text-slate-400 text-center">Cập nhật tỉ số, Lịch đấu, Sơ đồ Knockout</p>
                </button>

                <button onClick={() => setRole('viewer')} className="group bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                  <IconSmartphone size={40} className="text-blue-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Khán giả theo dõi</h2>
                  <p className="text-xs text-slate-400 text-center">Xem kết quả Live Realtime</p>
                </button>
              </div>
              {dbError && <p className="text-red-400 mt-6 text-xs font-bold bg-red-900/20 p-3 rounded-lg border border-red-500/20"><IconCloudOff size={14} className="inline mr-2"/> Database chưa kết nối. Vui lòng kiểm tra lại mạng!</p>}
            </div>

            {showAuthModal && (
              <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                  <div className="flex justify-center mb-4"><div className="bg-amber-500/10 p-4 rounded-full border border-amber-500/20"><IconKeyRound className="text-amber-400" size={32} /></div></div>
                  <h3 className="text-xl font-black text-white uppercase tracking-widest mb-1">Xác thực Admin</h3>
                  <p className="text-xs text-slate-400 mb-6">Nhập mã PIN để truy cập bảng điều khiển.</p>
                  <input type="password" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && verifyPasscode()}
                    placeholder="Nhập Passcode..." className="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-center font-black tracking-widest text-amber-400 mb-2 focus:outline-none focus:border-amber-500 transition-colors" autoFocus />
                  {authError && <p className="text-rose-500 text-xs font-bold mb-4">{authError}</p>}
                  <div className="flex space-x-3 mt-6">
                    <button onClick={() => {setShowAuthModal(false); setAuthError(''); setPasscodeInput('');}} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition">Hủy</button>
                    <button onClick={verifyPasscode} className="flex-1 py-3 bg-gradient-to-r from-amber-500 to-amber-600 text-slate-950 font-black rounded-xl transition shadow-lg">Xác nhận</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return <ScheduleApplication role={role} user={user} dbError={dbError} onBack={() => setRole(null)} />;
    }

    // --- 4. COMPONENT LỊCH THI ĐẤU CHÍNH ---
    function ScheduleApplication({ role, user, dbError, onBack }) {
      const [teams, setTeams] = useState([]);
      const [groups, setGroups] = useState({ A: [], B: [] });
      const [matches, setMatches] = useState([]);
      // State lưu tên cho các ngày thi đấu (Mỗi phần tử đại diện cho 1 nhóm 2 trận)
      const [days, setDays] = useState(['', '', '', '', '']); 
      const [bracket, setBracket] = useState({
          semi1Team1: null, semi1Team2: null,
          semi2Team1: null, semi2Team2: null,
          thirdTeam1: null, thirdTeam2: null,
          finalTeam1: null, finalTeam2: null
      });

      const [syncStatus, setSyncStatus] = useState('saved');
      const [isSynced, setIsSynced] = useState(true);
      const [isExportingImage, setIsExportingImage] = useState(false);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = getMainDocRef();
        
        const unsubscribe = docRef.onSnapshot({ includeMetadataChanges: true }, (docSnap) => {
          setIsSynced(!docSnap.metadata.hasPendingWrites);
          
          if (docSnap.exists) {
            const data = docSnap.data();
            setTeams(data.teams || []);
            setGroups(data.groups || { A: [], B: [] });
            setMatches(data.matches || []);
            setDays(data.days || ['', '', '', '', '']); // Nhận dữ liệu ngày
            setBracket(data.bracket || {
                semi1Team1: null, semi1Team2: null, semi2Team1: null, semi2Team2: null,
                thirdTeam1: null, thirdTeam2: null, finalTeam1: null, finalTeam2: null
            });
          }
        }, (err) => console.error("Snapshot error:", err));

        return () => unsubscribe();
      }, [user, role, dbError]);

      const syncToCloud = async (updates) => {
        if (user && !dbError) {
          setSyncStatus('saving');
          const docRef = getMainDocRef();
          await docRef.set(updates, { merge: true });
          setTimeout(() => setSyncStatus('saved'), 500); 
        }
      };

      const generateSchedule = async () => {
          if(groups.A.length !== 3 || groups.B.length !== 3) {
              alert("Draft chưa chia đủ 3 đội cho mỗi bảng (Tổng 6 đội) nên không thể tự động tạo lịch đấu chuẩn!");
              return;
          }
          if(matches.length > 0) {
              if(!window.confirm("CẢNH BÁO: Tạo lịch đấu mới sẽ xóa sạch kết quả thi đấu hiện tại. Tiếp tục?")) return;
          }

          const newMatches = [];
          newMatches.push({ id: `match_a1_${Date.now()}`, type: 'groupA', team1: groups.A[0], team2: groups.A[1], score1: '', score2: '' });
          newMatches.push({ id: `match_a2_${Date.now()}`, type: 'groupA', team1: groups.A[0], team2: groups.A[2], score1: '', score2: '' });
          newMatches.push({ id: `match_a3_${Date.now()}`, type: 'groupA', team1: groups.A[1], team2: groups.A[2], score1: '', score2: '' });

          newMatches.push({ id: `match_b1_${Date.now()}`, type: 'groupB', team1: groups.B[0], team2: groups.B[1], score1: '', score2: '' });
          newMatches.push({ id: `match_b2_${Date.now()}`, type: 'groupB', team1: groups.B[0], team2: groups.B[2], score1: '', score2: '' });
          newMatches.push({ id: `match_b3_${Date.now()}`, type: 'groupB', team1: groups.B[1], team2: groups.B[2], score1: '', score2: '' });

          newMatches.push({ id: `match_semi1_${Date.now()}`, type: 'semi1', team1: null, team2: null, score1: '', score2: '' });
          newMatches.push({ id: `match_semi2_${Date.now()}`, type: 'semi2', team1: null, team2: null, score1: '', score2: '' });
          newMatches.push({ id: `match_third_${Date.now()}`, type: 'third', team1: null, team2: null, score1: '', score2: '' });
          newMatches.push({ id: `match_final_${Date.now()}`, type: 'final', team1: null, team2: null, score1: '', score2: '' });

          const newBracket = {
            semi1Team1: null, semi1Team2: null, semi2Team1: null, semi2Team2: null,
            thirdTeam1: null, thirdTeam2: null, finalTeam1: null, finalTeam2: null
          };

          const newDays = ['', '', '', '', ''];

          setMatches(newMatches);
          setBracket(newBracket);
          setDays(newDays);
          await syncToCloud({ matches: newMatches, bracket: newBracket, days: newDays });
      };

      const handleUpdateScore = async (matchId, s1, s2) => {
          let newMatches = matches.map(m => m.id === matchId ? { ...m, score1: s1, score2: s2 } : m);
          let newBracket = { ...bracket };
          let bracketChanged = false;

          const updatedMatch = newMatches.find(m => m.id === matchId);
          if (updatedMatch && (updatedMatch.type === 'semi1' || updatedMatch.type === 'semi2')) {
              const s1Val = parseInt(s1);
              const s2Val = parseInt(s2);

              if (!isNaN(s1Val) && !isNaN(s2Val) && s1Val !== s2Val) {
                  const winnerId = s1Val > s2Val ? updatedMatch.team1 : updatedMatch.team2;
                  const loserId = s1Val > s2Val ? updatedMatch.team2 : updatedMatch.team1;

                  if (updatedMatch.type === 'semi1') {
                      newBracket.finalTeam1 = winnerId;
                      newBracket.thirdTeam1 = loserId;
                  } else {
                      newBracket.finalTeam2 = winnerId;
                      newBracket.thirdTeam2 = loserId;
                  }
                  bracketChanged = true;
              } else if (s1 === '' || s2 === '') {
                  if (updatedMatch.type === 'semi1') {
                      newBracket.finalTeam1 = null;
                      newBracket.thirdTeam1 = null;
                  } else {
                      newBracket.finalTeam2 = null;
                      newBracket.thirdTeam2 = null;
                  }
                  bracketChanged = true;
              }

              if (bracketChanged) {
                  newMatches = newMatches.map(m => {
                      if (m.type === 'final') return { ...m, team1: newBracket.finalTeam1, team2: newBracket.finalTeam2 };
                      if (m.type === 'third') return { ...m, team1: newBracket.thirdTeam1, team2: newBracket.thirdTeam2 };
                      return m;
                  });
                  setBracket(newBracket);
              }
          }

          setMatches(newMatches);
          const syncData = { matches: newMatches };
          if (bracketChanged) syncData.bracket = newBracket;
          await syncToCloud(syncData);
      };

      // Thay đổi tiêu đề Ngày thi đấu
      const handleChangeDayTime = async (dayIndex, newTime) => {
          if (role !== 'admin') return;
          const newDays = [...days];
          newDays[dayIndex] = newTime;
          setDays(newDays);
          await syncToCloud({ days: newDays });
      };

      const handleMoveMatch = async (index, direction) => {
          if (role !== 'admin') return;
          const newMatches = [...matches];
          if (direction === 'up' && index > 0) {
              [newMatches[index - 1], newMatches[index]] = [newMatches[index], newMatches[index - 1]];
          } else if (direction === 'down' && index < newMatches.length - 1) {
              [newMatches[index + 1], newMatches[index]] = [newMatches[index], newMatches[index + 1]];
          }
          setMatches(newMatches);
          await syncToCloud({ matches: newMatches });
      };

      const handleChangeMatchTeam = async (matchId, isTeam1, newTeamId) => {
          if (role !== 'admin') return;
          const newMatches = matches.map(m => {
              if (m.id === matchId) {
                  return { ...m, [isTeam1 ? 'team1' : 'team2']: newTeamId === '' ? null : Number(newTeamId) };
              }
              return m;
          });
          setMatches(newMatches);

          const match = newMatches.find(m => m.id === matchId);
          if (['semi1', 'semi2', 'third', 'final'].includes(match.type)) {
              const newBracket = { ...bracket };
              const key = `${match.type}Team${isTeam1 ? '1' : '2'}`;
              newBracket[key] = newTeamId === '' ? null : Number(newTeamId);
              setBracket(newBracket);
              await syncToCloud({ matches: newMatches, bracket: newBracket });
          } else {
              await syncToCloud({ matches: newMatches });
          }
      };

      const handleBracketChange = async (position, teamId) => {
          if (role !== 'admin') return;
          const newBracket = { ...bracket, [position]: teamId === '' ? null : Number(teamId) };
          setBracket(newBracket);

          const matchType = position.replace('Team1', '').replace('Team2', '');
          const isTeam1 = position.includes('Team1');
          
          const updatedMatches = matches.map(m => {
              if (m.type === matchType) {
                  return { ...m, [isTeam1 ? 'team1' : 'team2']: teamId === '' ? null : Number(teamId) };
              }
              return m;
          });

          setMatches(updatedMatches);
          await syncToCloud({ bracket: newBracket, matches: updatedMatches });
      };

      const calculateStandings = (groupIds) => {
          let standings = groupIds.map(id => ({ id, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 }));
          
          matches.forEach(m => {
              if ((m.type === 'groupA' || m.type === 'groupB') && m.score1 !== '' && m.score2 !== '') {
                  const s1 = parseInt(m.score1);
                  const s2 = parseInt(m.score2);
                  if (isNaN(s1) || isNaN(s2)) return;

                  const t1 = standings.find(t => t.id === m.team1);
                  const t2 = standings.find(t => t.id === m.team2);

                  if (t1 && t2) {
                      t1.p++; t2.p++;
                      t1.gf += s1; t1.ga += s2; t1.gd = t1.gf - t1.ga;
                      t2.gf += s2; t2.ga += s1; t2.gd = t2.gf - t2.ga;

                      if (s1 > s2) { t1.w++; t1.pts += 3; t2.l++; }
                      else if (s1 < s2) { t2.w++; t2.pts += 3; t1.l++; }
                      else { t1.d++; t2.d++; t1.pts += 1; t2.pts += 1; }
                  }
              }
          });

          return standings.sort((a, b) => {
              if (b.pts !== a.pts) return b.pts - a.pts;
              if (b.gd !== a.gd) return b.gd - a.gd;
              return b.gf - a.gf;
          });
      };

      const standingsA = calculateStandings(groups.A);
      const standingsB = calculateStandings(groups.B);

      const handleAutoFillSemi = async () => {
          if (role !== 'admin') return;
          if (standingsA.length < 2 || standingsB.length < 2) {
              alert("Bảng đấu chưa có đủ đội (Cần ít nhất 2 đội mỗi bảng)!");
              return;
          }
          if(!window.confirm("Hệ thống sẽ tự động xếp:\n- Bán Kết 1: Nhất A gặp Nhì B\n- Bán Kết 2: Nhất B gặp Nhì A\n\nBạn có muốn tiếp tục?")) return;

          const team1A = standingsA[0].id;
          const team2A = standingsA[1].id;
          const team1B = standingsB[0].id;
          const team2B = standingsB[1].id;

          const newBracket = {
              ...bracket,
              semi1Team1: team1A,
              semi1Team2: team2B,
              semi2Team1: team1B,
              semi2Team2: team2A
          };
          
          const updatedMatches = matches.map(m => {
              if (m.type === 'semi1') return { ...m, team1: team1A, team2: team2B };
              if (m.type === 'semi2') return { ...m, team1: team1B, team2: team2A };
              return m;
          });

          setBracket(newBracket);
          setMatches(updatedMatches);
          await syncToCloud({ bracket: newBracket, matches: updatedMatches });
      };

      const renderTeamNameObj = (teamId, matchType) => {
          if(!teamId) {
             if(matchType === 'semi1') return <span className="text-slate-500 text-xs md:text-sm italic">Nhất A / Nhì B</span>;
             if(matchType === 'semi2') return <span className="text-slate-500 text-xs md:text-sm italic">Nhất B / Nhì A</span>;
             if(matchType === 'third') return <span className="text-slate-500 text-xs md:text-sm italic">Thua BK 1 / Thua BK 2</span>;
             if(matchType === 'final') return <span className="text-slate-500 text-xs md:text-sm italic">Thắng BK 1 / Thắng BK 2</span>;
             return <span className="text-slate-500 text-xs md:text-sm italic">Chưa xác định</span>;
          }
          const t = teams.find(x => x.id === teamId);
          return t ? <span className="font-bold text-slate-200">{t.name}</span> : <span className="text-slate-500">???</span>;
      };
      
      const renderTeamLogo = (teamId) => {
          const t = teams.find(x => x.id === teamId);
          if (t && t.logo) return <img src={t.logo} className="w-5 h-5 md:w-6 md:h-6 object-contain mr-2" alt="logo" />;
          return <div className="w-5 h-5 md:w-6 md:h-6 bg-slate-800 rounded-full mr-2 flex-shrink-0 border border-white/10"></div>;
      };

      const getMatchTitle = (type) => {
          if(type === 'groupA') return "Bảng A";
          if(type === 'groupB') return "Bảng B";
          if(type === 'semi1') return "Bán Kết 1";
          if(type === 'semi2') return "Bán Kết 2";
          if(type === 'third') return "Tranh Hạng 3";
          if(type === 'final') return "Chung Kết";
          return "";
      }

      const renderMatchTeamSelect = (match, isTeam1) => {
          const teamId = isTeam1 ? match.team1 : match.team2;
          let availableTeams = [];
          if (match.type === 'groupA') availableTeams = groups.A.map(id => teams.find(t => t.id === id));
          else if (match.type === 'groupB') availableTeams = groups.B.map(id => teams.find(t => t.id === id));
          else availableTeams = teams.filter(t => [...groups.A, ...groups.B].includes(t.id));

          return (
              <select
                  value={teamId || ''}
                  onChange={(e) => handleChangeMatchTeam(match.id, isTeam1, e.target.value)}
                  className="bg-transparent text-slate-200 text-xs md:text-base font-bold appearance-none cursor-pointer outline-none max-w-[100px] md:max-w-[140px] truncate w-full hover:text-amber-400 transition"
                  style={{ textAlignLast: isTeam1 ? 'right' : 'left' }}
              >
                  <option value="" className="bg-slate-900 text-slate-500">Chọn đội...</option>
                  {availableTeams.map(t => t ? <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option> : null)}
              </select>
          );
      };

      // Hàm nhóm các trận đấu thành từng cặp
      const matchGroups = [];
      for (let i = 0; i < matches.length; i += 2) {
          matchGroups.push(matches.slice(i, i + 2));
      }

      const handleExportSchedule = () => {
          if(matches.length === 0) {
              alert("Chưa có lịch thi đấu để xuất!");
              return;
          }

          let content = "=========================================\n";
          content += "    LỊCH THI ĐẤU & KẾT QUẢ UNI LEAGUE    \n";
          content += "=========================================\n\n";

          // 1. BXH
          content += ">>> BẢNG XẾP HẠNG <<<\n";
          const formatStandings = (standings, groupName) => {
              content += `\n[ ${groupName} ]\n`;
              standings.forEach((t, i) => {
                  const teamName = teams.find(x => x.id === t.id)?.name || 'Chưa xác định';
                  content += `${i+1}. ${teamName} | ${t.pts}đ | Hệ số: ${t.gf}-${t.ga} (${t.gd > 0 ? '+'+t.gd : t.gd})\n`;
              });
          };
          formatStandings(standingsA, "BẢNG A");
          formatStandings(standingsB, "BẢNG B");
          content += "\n-----------------------------------------\n\n";

          // 2. KNOCKOUT
          content += ">>> SƠ ĐỒ KNOCK-OUT <<<\n\n";
          
          const getTName = (tid, fallback) => {
              if(!tid) return fallback;
              return teams.find(x => x.id === tid)?.name || fallback;
          };

          const semi1_1 = getTName(bracket.semi1Team1, "Nhất A");
          const semi1_2 = getTName(bracket.semi1Team2, "Nhì B");
          const semi2_1 = getTName(bracket.semi2Team1, "Nhất B");
          const semi2_2 = getTName(bracket.semi2Team2, "Nhì A");
          
          content += `[ BÁN KẾT 1 ] : ${semi1_1}  vs  ${semi1_2}\n`;
          content += `[ BÁN KẾT 2 ] : ${semi2_1}  vs  ${semi2_2}\n\n`;
          
          const third_1 = getTName(bracket.thirdTeam1, "Thua BK 1");
          const third_2 = getTName(bracket.thirdTeam2, "Thua BK 2");
          content += `[ HẠNG 3 ]    : ${third_1}  vs  ${third_2}\n\n`;

          const final_1 = getTName(bracket.finalTeam1, "Thắng BK 1");
          const final_2 = getTName(bracket.finalTeam2, "Thắng BK 2");
          content += `[ CHUNG KẾT ] : ${final_1}  vs  ${final_2}\n`;

          content += "\n-----------------------------------------\n\n";

          // 3. LỊCH THI ĐẤU
          content += ">>> LỊCH THI ĐẤU CHI TIẾT <<<\n";
          matchGroups.forEach((group, dayIndex) => {
              const dayTitle = days[dayIndex] || `Ngày thi đấu ${dayIndex + 1}`;
              content += `\n--- ${dayTitle.toUpperCase()} ---\n`;
              group.forEach(m => {
                  const t1Name = getTName(m.team1, '???');
                  const t2Name = getTName(m.team2, '???');
                  const score = (m.score1 !== '' && m.score2 !== '') ? `[ ${m.score1} - ${m.score2} ]` : '  vs  ';
                  const matchTitle = getMatchTitle(m.type);
                  content += `* ${matchTitle}: ${t1Name} ${score} ${t2Name}\n`;
              });
          });

          content += "\n=========================================\n";
          content += `Xuất lúc: ${new Date().toLocaleString('vi-VN')}\n`;

          const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `Lich_Thi_Dau_UniLeague_${new Date().toISOString().split('T')[0]}.txt`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
      };

      const handleExportImage = async () => {
          const captureElement = document.getElementById('capture-area');
          if (!captureElement) return;

          setIsExportingImage(true);
          try {
              // Thêm padding và background để ảnh xuất ra đẹp, không bị lỗi nền trong suốt
              const canvas = await html2canvas(captureElement, {
                  backgroundColor: '#0a0f1c', // Màu nền gốc của body
                  scale: 2, // Tăng độ nét gấp đôi
                  useCORS: true,
                  windowWidth: captureElement.scrollWidth,
                  windowHeight: captureElement.scrollHeight
              });
              
              const imgData = canvas.toDataURL('image/png');
              const link = document.createElement('a');
              link.href = imgData;
              link.download = `Hinh_Lich_Dau_UniLeague_${new Date().toISOString().split('T')[0]}.png`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          } catch (error) {
              console.error("Lỗi khi xuất ảnh:", error);
              alert("Có lỗi xảy ra khi tạo ảnh. Vui lòng thử lại!");
          } finally {
              setIsExportingImage(false);
          }
      };

      return (
        <div className="flex-1 flex flex-col relative w-full h-full">
          <div className="absolute inset-0 z-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'linear-gradient(to right, #ffffff05 1px, transparent 1px), linear-gradient(to bottom, #ffffff05 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-emerald-600/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none z-0 transform-gpu"></div>

          {/* HEADER */}
          <header className="relative z-20 bg-slate-900/80 backdrop-blur-md border-b border-white/5 px-3 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-lg flex-shrink-0">
            <div className="flex items-center space-x-2 md:space-x-4 shrink-0">
              <div className="relative cursor-pointer group flex-shrink-0" onClick={onBack} title="Quay lại">
                <div className="absolute inset-0 bg-emerald-400 blur-md opacity-30 rounded-full group-hover:animate-ping"></div>
                <div className="relative w-10 h-10 md:w-12 md:h-12 bg-gradient-to-br from-emerald-300 via-emerald-500 to-teal-700 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.2)] border border-emerald-200/50 transform rotate-3">
                  <IconCalendar className="text-slate-950" size={24} strokeWidth={2.5} />
                </div>
              </div>
              <div>
                <h1 className="text-xl md:text-3xl font-black tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-200 via-emerald-400 to-emerald-200 drop-shadow-lg leading-none">UNI LEAGUE</h1>
                <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Lịch Thi Đấu & Kết Quả</div>
              </div>
            </div>

            <div className="flex space-x-2 md:space-x-3 items-center shrink-0">
              <button onClick={handleExportImage} disabled={isExportingImage || matches.length === 0} className="bg-slate-800 hover:bg-slate-700 text-cyan-400 border border-cyan-500/30 px-3 py-2 md:px-4 md:py-2.5 rounded-xl font-bold flex items-center transition text-xs md:text-sm shrink-0 shadow-lg disabled:opacity-50">
                 {isExportingImage ? <IconRotateCcw size={16} className="mr-1.5 md:mr-2 animate-spin" /> : <IconCamera size={16} className="mr-1.5 md:mr-2" />} 
                 <span className="hidden sm:inline">{isExportingImage ? 'Đang tạo...' : 'Lưu Ảnh'}</span>
              </button>

              <button onClick={handleExportSchedule} className="bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-emerald-500/30 px-3 py-2 md:px-4 md:py-2.5 rounded-xl font-bold flex items-center transition text-xs md:text-sm shrink-0 shadow-lg">
                 <IconDownload size={16} className="mr-1.5 md:mr-2" /> <span className="hidden sm:inline">Xuất File</span>
              </button>

              {role === 'admin' && !dbError && (
                 <div className="hidden lg:flex items-center space-x-2 mr-2 px-3 py-1.5 rounded-lg bg-slate-800/50 border border-white/5">
                    {!isSynced ? (
                       <><IconRotateCcw size={14} className="text-yellow-400 animate-spin" /><span className="text-[10px] text-yellow-400 uppercase tracking-widest font-bold whitespace-nowrap">Lưu Tạm</span></>
                    ) : syncStatus === 'saving' ? (
                       <><IconRotateCcw size={14} className="text-emerald-400 animate-spin" /><span className="text-[10px] text-emerald-400 uppercase tracking-widest font-bold whitespace-nowrap">Đang lưu...</span></>
                    ) : (
                       <><IconCheckCircle size={14} className="text-emerald-400" /><span className="text-[10px] text-emerald-400 uppercase tracking-widest font-bold whitespace-nowrap">Đã lưu Cloud</span></>
                    )}
                 </div>
              )}
              
              {role === 'admin' ? (
                 <button onClick={generateSchedule} className="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 px-3 py-2 sm:px-4 md:px-6 md:py-3 rounded-xl font-black uppercase tracking-widest whitespace-nowrap shadow-[0_0_20px_rgba(16,185,129,0.4)] transition text-xs sm:text-sm md:text-base flex items-center shrink-0">
                    <IconCalendar size={16} className="mr-1 md:mr-2" /> {matches.length > 0 ? "Tạo Lại Lịch" : "Tạo Lịch Đấu"}
                 </button>
              ) : (
                <div className="bg-emerald-500/10 border border-emerald-500/30 px-2 py-1 md:px-4 md:py-2 rounded-xl flex items-center text-emerald-400 text-[10px] md:text-sm font-bold animate-pulse shadow-[0_0_15px_rgba(16,185,129,0.2)] whitespace-nowrap">
                   <IconMonitorPlay size={12} className="mr-1 md:mr-2" /> Realtime
                </div>
              )}
            </div>
          </header>

          <main className="flex-1 p-3 md:p-6 overflow-y-auto custom-scrollbar relative z-10 flex flex-col gap-6">
                
            {matches.length === 0 ? (
                <div className="flex-1 flex flex-col items-center justify-center bg-slate-900/60 rounded-3xl border border-white/10 p-10 text-center min-h-[400px]">
                    <IconCalendar className="text-slate-600 mb-4" size={64}/>
                    <h2 className="text-2xl text-white font-black uppercase mb-2">Chưa có lịch thi đấu</h2>
                    <p className="text-slate-400 max-w-md">Vui lòng chờ Ban Tổ Chức (Admin) chia bảng và khởi tạo lịch thi đấu chính thức.</p>
                </div>
            ) : (
                <div id="capture-area" className="flex flex-col gap-6 p-2">
                    {/* KHU VỰC BXH (TOP) */}
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        {/* BXH BẢNG A */}
                        <div className="bg-slate-900/80 backdrop-blur-md rounded-2xl border border-white/10 overflow-hidden shadow-xl">
                            <div className="bg-gradient-to-r from-amber-600 to-amber-900 p-3 text-center border-b border-amber-500/30"><h3 className="font-black text-white uppercase tracking-widest text-lg">Bảng Xếp Hạng A</h3></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="text-xs uppercase bg-slate-800/50 text-amber-400 font-bold border-b border-white/10">
                                        <tr><th className="px-4 py-3">Đội</th><th className="px-2 py-3 text-center">Trận</th><th className="px-2 py-3 text-center">T</th><th className="px-2 py-3 text-center">H</th><th className="px-2 py-3 text-center">B</th><th className="px-2 py-3 text-center">BT-BB</th><th className="px-2 py-3 text-center text-white text-base">Điểm</th></tr>
                                    </thead>
                                    <tbody>
                                        {standingsA.map((t, idx) => {
                                            const teamInfo = teams.find(x => x.id === t.id);
                                            return (
                                                <tr key={t.id} className="border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors">
                                                    <td className="px-4 py-3 flex items-center space-x-3">
                                                        <span className={`font-black italic text-lg ${idx < 2 ? 'text-amber-400' : 'text-slate-600'}`}>{idx+1}</span>
                                                        {renderTeamLogo(t.id)}
                                                        <span className={`font-bold uppercase ${idx < 2 ? 'text-white' : 'text-slate-400'}`}>{teamInfo?.name || '---'}</span>
                                                    </td>
                                                    <td className="px-2 py-3 text-center text-slate-300 font-medium">{t.p}</td>
                                                    <td className="px-2 py-3 text-center text-emerald-400 font-bold">{t.w}</td>
                                                    <td className="px-2 py-3 text-center text-slate-400 font-bold">{t.d}</td>
                                                    <td className="px-2 py-3 text-center text-rose-400 font-bold">{t.l}</td>
                                                    <td className="px-2 py-3 text-center text-slate-300 font-medium">{t.gf} - {t.ga} <span className={`text-[10px] ml-1 ${t.gd > 0 ? 'text-emerald-400' : t.gd < 0 ? 'text-rose-400' : 'text-slate-500'}`}>({t.gd > 0 ? '+'+t.gd : t.gd})</span></td>
                                                    <td className="px-2 py-3 text-center text-amber-400 font-black text-lg">{t.pts}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        {/* BXH BẢNG B */}
                        <div className="bg-slate-900/80 backdrop-blur-md rounded-2xl border border-white/10 overflow-hidden shadow-xl">
                            <div className="bg-gradient-to-r from-blue-600 to-blue-900 p-3 text-center border-b border-blue-500/30"><h3 className="font-black text-white uppercase tracking-widest text-lg">Bảng Xếp Hạng B</h3></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="text-xs uppercase bg-slate-800/50 text-cyan-400 font-bold border-b border-white/10">
                                        <tr><th className="px-4 py-3">Đội</th><th className="px-2 py-3 text-center">Trận</th><th className="px-2 py-3 text-center">T</th><th className="px-2 py-3 text-center">H</th><th className="px-2 py-3 text-center">B</th><th className="px-2 py-3 text-center">BT-BB</th><th className="px-2 py-3 text-center text-white text-base">Điểm</th></tr>
                                    </thead>
                                    <tbody>
                                        {standingsB.map((t, idx) => {
                                            const teamInfo = teams.find(x => x.id === t.id);
                                            return (
                                                <tr key={t.id} className="border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors">
                                                    <td className="px-4 py-3 flex items-center space-x-3">
                                                        <span className={`font-black italic text-lg ${idx < 2 ? 'text-cyan-400' : 'text-slate-600'}`}>{idx+1}</span>
                                                        {renderTeamLogo(t.id)}
                                                        <span className={`font-bold uppercase ${idx < 2 ? 'text-white' : 'text-slate-400'}`}>{teamInfo?.name || '---'}</span>
                                                    </td>
                                                    <td className="px-2 py-3 text-center text-slate-300 font-medium">{t.p}</td>
                                                    <td className="px-2 py-3 text-center text-emerald-400 font-bold">{t.w}</td>
                                                    <td className="px-2 py-3 text-center text-slate-400 font-bold">{t.d}</td>
                                                    <td className="px-2 py-3 text-center text-rose-400 font-bold">{t.l}</td>
                                                    <td className="px-2 py-3 text-center text-slate-300 font-medium">{t.gf} - {t.ga} <span className={`text-[10px] ml-1 ${t.gd > 0 ? 'text-emerald-400' : t.gd < 0 ? 'text-rose-400' : 'text-slate-500'}`}>({t.gd > 0 ? '+'+t.gd : t.gd})</span></td>
                                                    <td className="px-2 py-3 text-center text-cyan-400 font-black text-lg">{t.pts}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* KHU VỰC SƠ ĐỒ KNOCKOUT (MIDDLE) */}
                    <div className="bg-slate-900/80 backdrop-blur-md rounded-3xl border border-white/10 p-4 md:p-8 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[200px] bg-amber-500/5 blur-[80px] pointer-events-none z-0"></div>
                        
                        <div className="flex justify-between items-center mb-8 relative z-20">
                            <h2 className="text-xl md:text-2xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500 whitespace-nowrap m-0 md:mx-auto">Sơ Đồ Knock-out</h2>
                            
                            {/* Nút Tự động điền Bán kết cho Admin */}
                            {role === 'admin' && (
                                <button onClick={handleAutoFillSemi} className="absolute right-0 bg-amber-500/20 hover:bg-amber-500/40 text-amber-400 text-[10px] md:text-xs font-bold px-3 py-2 md:px-4 md:py-2.5 rounded-xl flex items-center border border-amber-500/50 transition whitespace-nowrap shadow-lg">
                                    <IconWand size={16} className="mr-1.5" /> Lấy Top 2 Bảng
                                </button>
                            )}
                        </div>
                        
                        <div className="relative flex flex-col items-center z-10 w-full overflow-x-auto pb-4 custom-scrollbar">
                            
                            {/* HÀNG 1: BÁN KẾT & CHUNG KẾT */}
                            <div className="flex items-center min-w-max px-4">
                                
                                {/* CỘT BÁN KẾT */}
                                <div className="flex flex-col gap-12 w-[260px] md:w-[280px]">
                                    {/* Bán kết 1 */}
                                    <div className="bg-slate-800 border-2 border-white/10 rounded-xl p-3 shadow-lg relative z-20 hover:border-amber-500/50 transition-colors">
                                        <div className="hidden md:block absolute top-1/2 -right-[34px] w-[34px] border-t-2 border-slate-600/70 z-[-1]"></div>
                                        <div className="hidden md:block absolute top-1/2 -right-[34px] h-[calc(50%+1.5rem)] border-r-2 border-slate-600/70 rounded-tr-lg z-[-1]"></div>
                                        
                                        <div className="text-[10px] uppercase font-bold text-slate-500 mb-2 border-b border-white/5 pb-1 text-center">Bán Kết 1</div>
                                        <div className="flex flex-col gap-2 relative z-30">
                                            <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.semi1Team1 || ''} onChange={(e) => handleBracketChange('semi1Team1', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.semi1Team1)}<div className="truncate">{renderTeamNameObj(bracket.semi1Team1, 'semi1')}</div></div>
                                                )}
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.semi1Team2 || ''} onChange={(e) => handleBracketChange('semi1Team2', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.semi1Team2)}<div className="truncate">{renderTeamNameObj(bracket.semi1Team2, 'semi1')}</div></div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Bán kết 2 */}
                                    <div className="bg-slate-800 border-2 border-white/10 rounded-xl p-3 shadow-lg relative z-20 hover:border-amber-500/50 transition-colors">
                                        <div className="hidden md:block absolute top-1/2 -right-[34px] w-[34px] border-t-2 border-slate-600/70 z-[-1]"></div>
                                        <div className="hidden md:block absolute bottom-1/2 -right-[34px] h-[calc(50%+1.5rem)] border-r-2 border-slate-600/70 rounded-br-lg z-[-1]"></div>
                                        
                                        <div className="text-[10px] uppercase font-bold text-slate-500 mb-2 border-b border-white/5 pb-1 text-center">Bán Kết 2</div>
                                        <div className="flex flex-col gap-2 relative z-30">
                                            <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.semi2Team1 || ''} onChange={(e) => handleBracketChange('semi2Team1', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.semi2Team1)}<div className="truncate">{renderTeamNameObj(bracket.semi2Team1, 'semi2')}</div></div>
                                                )}
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.semi2Team2 || ''} onChange={(e) => handleBracketChange('semi2Team2', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.semi2Team2)}<div className="truncate">{renderTeamNameObj(bracket.semi2Team2, 'semi2')}</div></div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* ĐƯỜNG NỐI TỪ BÁN KẾT SANG CHUNG KẾT */}
                                <div className="hidden md:flex items-center w-8 h-full relative z-10 mx-[2px]">
                                    <div className="w-full border-t-2 border-amber-500/80 shadow-[0_0_8px_#fbbf24]"></div>
                                    <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-amber-400 rounded-full shadow-[0_0_10px_#fbbf24]"></div>
                                </div>

                                {/* CỘT CHUNG KẾT */}
                                <div className="w-[260px] md:w-[320px] ml-8 md:ml-0 shrink-0 relative z-20">
                                    <div className="bg-slate-900 bg-gradient-to-br from-amber-600/30 to-amber-900/30 border-2 border-amber-500/50 rounded-2xl p-4 shadow-[0_0_30px_rgba(245,158,11,0.2)] relative transform md:scale-105">
                                        <div className="hidden md:block absolute top-1/2 -left-8 w-8 border-t-2 border-amber-500/80 z-[-1]"></div>
                                        
                                        <div className="text-[10px] md:text-xs uppercase font-black text-amber-400 mb-3 border-b border-amber-500/30 pb-2 text-center flex justify-center items-center"><IconTrophy size={16} className="mr-2"/> Chung Kết</div>
                                        <div className="flex flex-col gap-3 relative z-30">
                                            <div className="flex items-center justify-between bg-slate-950 p-2.5 md:p-3 rounded-xl border border-amber-500/30 shadow-inner relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.finalTeam1 || ''} onChange={(e) => handleBracketChange('finalTeam1', e.target.value)} className="bg-transparent text-sm md:text-base font-black text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.finalTeam1)}<div className="text-sm md:text-base truncate">{renderTeamNameObj(bracket.finalTeam1, 'final')}</div></div>
                                                )}
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-950 p-2.5 md:p-3 rounded-xl border border-amber-500/30 shadow-inner relative z-30">
                                                {role === 'admin' ? (
                                                    <select value={bracket.finalTeam2 || ''} onChange={(e) => handleBracketChange('finalTeam2', e.target.value)} className="bg-transparent text-sm md:text-base font-black text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                        <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                        {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                    </select>
                                                ) : (
                                                    <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.finalTeam2)}<div className="text-sm md:text-base truncate">{renderTeamNameObj(bracket.finalTeam2, 'final')}</div></div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* HÀNG 2: TRANH HẠNG 3 */}
                            <div className="mt-8 md:mt-12 w-[260px] md:w-[300px]">
                                <div className="bg-slate-800 border border-white/10 rounded-xl p-3 shadow-lg relative z-20 opacity-90">
                                    <div className="text-[10px] uppercase font-bold text-slate-400 mb-2 border-b border-white/5 pb-1 text-center">Tranh Hạng 3</div>
                                    <div className="flex flex-col gap-2 relative z-30">
                                        <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                            {role === 'admin' ? (
                                                <select value={bracket.thirdTeam1 || ''} onChange={(e) => handleBracketChange('thirdTeam1', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                    <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                    {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                </select>
                                            ) : (
                                                <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.thirdTeam1)}<div className="truncate">{renderTeamNameObj(bracket.thirdTeam1, 'third')}</div></div>
                                            )}
                                        </div>
                                        <div className="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-white/5 relative z-30">
                                            {role === 'admin' ? (
                                                <select value={bracket.thirdTeam2 || ''} onChange={(e) => handleBracketChange('thirdTeam2', e.target.value)} className="bg-transparent text-xs md:text-sm font-bold text-white outline-none w-full appearance-none cursor-pointer relative z-30 hover:text-amber-400 transition">
                                                    <option value="" className="text-slate-500 bg-slate-900">Chọn đội...</option>
                                                    {teams.filter(t => [...groups.A, ...groups.B].includes(t.id)).map(t => <option key={t.id} value={t.id} className="bg-slate-900 text-white">{t.name}</option>)}
                                                </select>
                                            ) : (
                                                <div className="flex items-center w-full truncate">{renderTeamLogo(bracket.thirdTeam2)}<div className="truncate">{renderTeamNameObj(bracket.thirdTeam2, 'third')}</div></div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* KHU VỰC CẬP NHẬT TỈ SỐ & LỊCH ĐẤU GỘP THEO NGÀY (BOTTOM) */}
                    <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-white/10 p-4 md:p-6 shadow-lg">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 border-b border-white/10 pb-3 gap-2">
                            <h2 className="text-lg font-black text-white uppercase tracking-widest flex items-center">
                                <IconSwords className="mr-2 text-rose-400" size={20} /> Cập Nhật Tỉ Số & Lịch Đấu
                            </h2>
                            {role === 'admin' ? (
                                <p className="text-[10px] md:text-xs text-amber-400 font-bold italic">
                                    * Tỉ số Bán Kết sẽ tự động quyết định đội vào Chung Kết.
                                </p>
                            ) : (
                                <span className="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-lg w-max font-bold animate-pulse">Realtime</span>
                            )}
                        </div>
                        
                        <div className="flex flex-col gap-6 md:gap-8">
                            {matchGroups.map((group, dayIndex) => (
                                <div key={dayIndex} className="bg-slate-900/40 rounded-2xl border border-white/5 p-4 md:p-6 flex flex-col gap-4 shadow-lg">
                                    
                                    {/* Ngày thi đấu Header */}
                                    <div className="flex items-center pb-3 mb-1 border-b border-white/10">
                                        <IconCalendar className="text-emerald-400 mr-2 shrink-0" size={20} />
                                        {role === 'admin' ? (
                                            <input 
                                                type="text" 
                                                placeholder={`VD: Ngày ${dayIndex + 1} - Thứ 7, 15/04`} 
                                                value={days[dayIndex] || ''} 
                                                onChange={(e) => handleChangeDayTime(dayIndex, e.target.value)}
                                                className="bg-slate-950/80 border border-emerald-500/30 text-emerald-400 text-sm md:text-base font-bold rounded-lg px-3 py-1.5 focus:outline-none focus:border-emerald-500 w-full max-w-sm transition-colors"
                                            />
                                        ) : (
                                            <span className="text-emerald-400 font-black text-sm md:text-base uppercase tracking-widest">
                                                {days[dayIndex] || `Ngày thi đấu ${dayIndex + 1}`}
                                            </span>
                                        )}
                                    </div>

                                    {/* Render các trận trong ngày */}
                                    <div className="flex flex-col gap-3 md:gap-4">
                                        {group.map((m, relativeIdx) => {
                                            const originalIndex = dayIndex * 2 + relativeIdx;
                                            
                                            let borderLeft = "border-l-4 border-slate-700";
                                            if(m.type === 'groupA') borderLeft = "border-l-4 border-amber-500";
                                            if(m.type === 'groupB') borderLeft = "border-l-4 border-blue-500";
                                            if(m.type === 'semi1' || m.type === 'semi2') borderLeft = "border-l-4 border-purple-500";
                                            if(m.type === 'third' || m.type === 'final') borderLeft = "border-l-4 border-rose-500";

                                            return (
                                                <div key={m.id} className={`flex flex-col md:flex-row items-center justify-between bg-slate-800/80 p-3 md:p-4 rounded-xl border border-white/5 hover:bg-slate-700/80 transition ${borderLeft}`}>
                                                    
                                                    {/* CỘT THÔNG TIN VÒNG ĐẤU */}
                                                    <div className="w-full md:w-[120px] text-center md:text-left mb-3 md:mb-0 shrink-0 flex flex-col justify-center items-center md:items-start gap-1">
                                                        <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest bg-slate-900/50 px-2 py-1 rounded w-fit">
                                                            {getMatchTitle(m.type)}
                                                        </div>
                                                    </div>

                                                    {/* CỘT ĐỘI 1 - TỈ SỐ - ĐỘI 2 */}
                                                    <div className="flex-1 flex items-center justify-center w-full min-w-0">
                                                        {/* ĐỘI 1 */}
                                                        <div className="flex-1 flex items-center justify-end text-right pr-2 md:pr-4 min-w-0">
                                                            {role === 'admin' ? renderMatchTeamSelect(m, true) : <span className="font-bold text-xs md:text-base text-slate-200 truncate">{m.team1 ? teams.find(t=>t.id===m.team1)?.name : '???'}</span>}
                                                            <div className="ml-2 md:ml-3 shrink-0">{renderTeamLogo(m.team1)}</div>
                                                        </div>
                                                        
                                                        {/* TỈ SỐ */}
                                                        <div className="flex items-center space-x-1 md:space-x-2 shrink-0 bg-slate-950 p-1 md:p-2 rounded-lg border border-white/10 mx-1 md:mx-2 shadow-inner">
                                                            {role === 'admin' ? (
                                                                <>
                                                                    <input type="number" min="0" value={m.score1} onChange={(e) => handleUpdateScore(m.id, e.target.value, m.score2)} className="w-8 h-8 md:w-12 md:h-12 text-center bg-slate-800 text-white font-black text-base md:text-xl rounded focus:ring-2 focus:ring-amber-500 outline-none transition-all" placeholder="-" />
                                                                    <span className="text-slate-500 font-bold">:</span>
                                                                    <input type="number" min="0" value={m.score2} onChange={(e) => handleUpdateScore(m.id, m.score1, e.target.value)} className="w-8 h-8 md:w-12 md:h-12 text-center bg-slate-800 text-white font-black text-base md:text-xl rounded focus:ring-2 focus:ring-amber-500 outline-none transition-all" placeholder="-" />
                                                                </>
                                                            ) : (
                                                                <div className="px-2 md:px-5 py-1 md:py-2 text-center font-black text-base md:text-2xl tracking-widest min-w-[60px] md:min-w-[90px]">
                                                                    <span className={m.score1 !== '' ? "text-amber-400 drop-shadow-md" : "text-slate-600"}>{m.score1 !== '' ? m.score1 : '-'}</span>
                                                                    <span className="text-slate-600 mx-1 md:mx-2">:</span>
                                                                    <span className={m.score2 !== '' ? "text-amber-400 drop-shadow-md" : "text-slate-600"}>{m.score2 !== '' ? m.score2 : '-'}</span>
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* ĐỘI 2 */}
                                                        <div className="flex-1 flex items-center justify-start text-left pl-2 md:pl-4 min-w-0">
                                                            <div className="mr-2 md:mr-3 shrink-0">{renderTeamLogo(m.team2)}</div>
                                                            {role === 'admin' ? renderMatchTeamSelect(m, false) : <span className="font-bold text-xs md:text-base text-slate-200 truncate">{m.team2 ? teams.find(t=>t.id===m.team2)?.name : '???'}</span>}
                                                        </div>
                                                    </div>

                                                    {/* Nút điều khiển Kéo/Thả Lên Xuống cho Admin */}
                                                    {role === 'admin' && (
                                                        <div className="flex flex-row md:flex-col gap-2 md:gap-1 mt-3 md:mt-0 md:ml-4 shrink-0 md:border-l border-white/10 md:pl-4 justify-center">
                                                            <button onClick={() => handleMoveMatch(originalIndex, 'up')} disabled={originalIndex === 0} className="p-2 md:p-1.5 bg-slate-800 hover:bg-amber-500 text-slate-400 hover:text-slate-900 rounded disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Kéo trận này Lên trên"><IconArrowUp size={16}/></button>
                                                            <button onClick={() => handleMoveMatch(originalIndex, 'down')} disabled={originalIndex === matches.length - 1} className="p-2 md:p-1.5 bg-slate-800 hover:bg-amber-500 text-slate-400 hover:text-slate-900 rounded disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Đẩy trận này Xuống dưới"><IconArrowDown size={16}/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
