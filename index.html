<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hệ Thống Bốc Thăm UNI LEAGUE (Pro)</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <style>
    /* Animations & Scrollbar */
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    .animate-fade-in-right { animation: fadeInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* FIFA Pack Open Animations */
    @keyframes fifaFlash {
        0% { opacity: 0; transform: scale(0.2) translateY(100px); filter: brightness(0); }
        40% { opacity: 1; transform: scale(1.15) translateY(-20px); filter: brightness(2.5) drop-shadow(0 0 80px #fbbf24); }
        65% { transform: scale(0.95) translateY(10px); filter: brightness(1.2) drop-shadow(0 0 20px #fbbf24); }
        100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1) drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }
    }
    @keyframes fifaRays {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .card-reveal-fifa { opacity: 0; animation: fifaFlash 1.5s ease-out forwards; }

    /* Logo Animations */
    @keyframes logoSpinReveal {
        0% { transform: scale(0) rotate(-540deg); opacity: 0; filter: brightness(2); }
        70% { transform: scale(1.2) rotate(10deg); filter: brightness(1.5); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
    }
    .animate-logo-reveal { animation: logoSpinReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    
    /* Hiệu ứng bay vô mượt mà dành riêng cho Logo thẻ Đội Trưởng */
    @keyframes smoothCardLogoReveal {
        0% { transform: translate(-50%, -40%) scale(0.2) rotate(-15deg); opacity: 0; filter: blur(10px) brightness(2); }
        60% { transform: translate(-50%, -65%) scale(1.15) rotate(5deg); opacity: 1; filter: blur(0px) brightness(1.2) drop-shadow(0 0 15px rgba(255,255,255,0.4)); }
        100% { transform: translate(-50%, -60%) scale(1) rotate(0deg); opacity: 1; filter: blur(0px) brightness(1); }
    }

    @keyframes fastSpin {
        0% { transform: rotate(0deg) scale(0.8); opacity: 0.5; filter: blur(2px); }
        100% { transform: rotate(360deg) scale(0.8); opacity: 0.5; filter: blur(2px); }
    }
    .animate-fast-spin { animation: fastSpin 0.15s linear infinite; }

    /* Intro Animations */
    @keyframes swirlIn {
        0% { transform: translate(var(--tx), var(--ty)) rotate(-720deg) scale(0); opacity: 0; }
        30% { transform: translate(0, 0) rotate(0deg) scale(1.2); opacity: 1; filter: drop-shadow(0 0 30px rgba(245,158,11,0.8)); }
        60% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; filter: drop-shadow(0 0 10px rgba(245,158,11,0.5)); }
        100% { transform: translate(var(--tx2), var(--ty2)) rotate(180deg) scale(3); opacity: 0; filter: blur(20px); }
    }
    @keyframes textSuperReveal {
        0% { transform: scale(0); opacity: 0; filter: blur(30px); }
        45% { transform: scale(0); opacity: 0; filter: blur(30px); }
        60% { transform: scale(1.3); opacity: 1; filter: blur(0px) drop-shadow(0 0 50px #fbbf24); }
        90% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 20px #fbbf24); }
        100% { transform: scale(1.1); opacity: 0; filter: blur(20px); }
    }
    @keyframes flashGlow {
        0% { opacity: 0; transform: scale(0.5); }
        45% { opacity: 0; transform: scale(0.5); }
        55% { opacity: 1; transform: scale(3); }
        100% { opacity: 0; transform: scale(5); }
    }
    @keyframes fadeOutIntro {
        0% { opacity: 1; pointer-events: all; }
        85% { opacity: 1; pointer-events: all; }
        100% { opacity: 0; pointer-events: none; visibility: hidden; display: none; }
    }

    /* Sparkles & Aurora Orbs (Hiệu ứng Background lung linh) */
    @keyframes auroraFloat {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(5vw, -5vh) scale(1.1); }
        66% { transform: translate(-5vw, 5vh) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
    }
    .aurora-1 { animation: auroraFloat 15s ease-in-out infinite alternate; }
    .aurora-2 { animation: auroraFloat 18s ease-in-out infinite alternate-reverse; animation-delay: -5s; }
    .aurora-3 { animation: auroraFloat 20s ease-in-out infinite alternate; animation-delay: -10s; }

    @keyframes sparkleTwinkle {
        0%, 100% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 5px white); }
    }
    .sparkle-star { animation: sparkleTwinkle 3s infinite ease-in-out; }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    
    /* Chống nảy trang trên Mobile */
    body { overscroll-behavior-y: none; }
  </style>
</head>

    const DEFAULT_PASSCODE = "unidraft2024";

    // --- 3. ICONS ---

    const IconChevronRight = ({ className, size=32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;

        }, [onComplete]);

        const logos = [
           { src: INITIAL_TEAMS[0].logo, tx: '-100vw', ty: '-100vh', tx2: '-300px', ty2: '-300px', delay: '0s' },
           { src: INITIAL_TEAMS[1].logo, tx: '0', ty: '-100vh', tx2: '0', ty2: '-400px', delay: '0.1s' },
           { src: INITIAL_TEAMS[2].logo, tx: '100vw', ty: '-100vh', tx2: '300px', ty2: '-300px', delay: '0.2s' },

        return (
           <div className="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center overflow-hidden" style={{ animation: 'fadeOutIntro 4s forwards' }}>
               <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
               <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150vw] h-[150vw] bg-[conic-gradient(from_0deg,transparent_0deg,#fbbf2411_10deg,transparent_20deg,transparent_40deg,#fbbf2411_50deg,transparent_60deg,transparent_80deg,#fbbf2411_90deg,transparent_100deg)] mix-blend-screen" style={{animation: 'fifaRays 10s linear infinite'}}></div>
               
               <div className="relative w-full h-full flex items-center justify-center">
                   {logos.map((l, i) => (
                       <img key={i} src={l.src} className="absolute w-24 h-24 md:w-36 md:h-36 object-contain z-10" 
                            style={{
                                '--tx': l.tx, '--ty': l.ty, '--tx2': l.tx2, '--ty2': l.ty2,
                                animation: `swirlIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) ${l.delay} forwards`
                            }} 
                       />
                   ))}
                   
                   <div className="absolute w-[150px] h-[150px] bg-amber-400 rounded-full blur-[80px]" style={{animation: 'flashGlow 4s forwards'}}></div>
                   
                   <h1 className="absolute text-5xl sm:text-7xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 tracking-[0.2em] uppercase z-20 text-center" style={{ animation: 'textSuperReveal 4s cubic-bezier(0.16, 1, 0.3, 1) forwards' }}>
                       UNI LEAGUE
                   </h1>
               </div>

        );
    };

    // --- 4. MAIN APP COMPONENT ---
    function App() {
      const [showIntro, setShowIntro] = useState(true);
      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(false);
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passcodeInput, setPasscodeInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [currentPasscode, setCurrentPasscode] = useState(DEFAULT_PASSCODE);

      useEffect(() => {
        const doAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Auth error:", error);
            setDbError(true);
          }
        };
        doAuth();

        const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = getSecurityDocRef();
        const unsub = docRef.onSnapshot((snap) => {
          if (snap.exists && snap.data().passcode) setCurrentPasscode(snap.data().passcode);
        }, (err) => console.log(err));
        return () => unsub();
      }, [user, dbError]);

      const verifyPasscode = () => {
        if (passcodeInput === currentPasscode) {
          setShowAuthModal(false); setRole('admin'); setPasscodeInput(''); setAuthError('');
        } else { setAuthError('Mật khẩu không chính xác!'); }
      };

      if (!role) {
        return (
          <>
          {showIntro && <IntroScreen onComplete={() => setShowIntro(false)} />}
          <div className="fixed inset-0 bg-[#0a0f1c] flex items-center justify-center p-4 md:p-6 relative overflow-hidden font-sans">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-500/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none z-0 transform-gpu"></div>
            
            <div className="bg-slate-900/80 backdrop-blur-md md:backdrop-blur-xl border border-white/10 p-6 md:p-10 rounded-3xl shadow-2xl z-10 max-w-2xl w-full text-center">
              <div className="flex justify-center mb-6">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-amber-700 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.4)]">
                  <IconTrophy className="text-slate-950" size={36} />
                </div>
              </div>
              <h1 className="text-2xl md:text-4xl font-black text-white uppercase tracking-wider mb-2">Hệ Thống Draft</h1>
              <p className="text-xs md:text-sm text-slate-400 mb-8">Vui lòng chọn vai trò để truy cập UNI LEAGUE</p>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 relative">
                <button onClick={() => setShowAuthModal(true)} className="group relative bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-amber-500/50 hover:shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                  <div className="absolute top-4 right-4 bg-slate-900 p-1.5 rounded-md border border-white/10 text-amber-500/50"><IconLock size={14} /></div>
                  <IconMonitorPlay size={40} className="text-amber-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Màn hình Livestream</h2>
                  <p className="text-xs text-slate-400 text-center">Phòng dành cho MC và Quản trị viên</p>
                </button>

                <button onClick={() => setRole('viewer')} className="group bg-slate-800 hover:bg-slate-700 border border-white/5 rounded-2xl p-6 md:p-8 flex flex-col items-center transition-all duration-300 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                  <IconSmartphone size={40} className="text-blue-400 mb-3 group-hover:scale-110 transition-transform" />
                  <h2 className="text-lg md:text-xl font-bold text-white mb-2">Khán giả theo dõi</h2>
                  <p className="text-xs text-slate-400 text-center">Xem kết quả bốc thăm trên thiết bị cá nhân</p>
                </button>
              </div>
              {dbError && <p className="text-red-400 mt-6 text-xs font-bold bg-red-900/20 p-3 rounded-lg border border-red-500/20"><IconCloudOff size={14} className="inline mr-2"/> Database chưa kết nối. Vui lòng kiểm tra lại mạng!</p>}
            </div>

            {showAuthModal && (
              <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                  <div className="flex justify-center mb-4"><div className="bg-amber-500/10 p-4 rounded-full border border-amber-500/20"><IconKeyRound className="text-amber-400" size={32} /></div></div>
                  <h3 className="text-xl font-black text-white uppercase tracking-widest mb-1">Xác thực Admin</h3>
                  <p className="text-xs text-slate-400 mb-6">Nhập mã PIN để truy cập bảng điều khiển.</p>
                  <input type="password" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && verifyPasscode()}
                    placeholder="Nhập Passcode..." className="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-center font-black tracking-widest text-amber-400 mb-2 focus:outline-none focus:border-amber-500 transition-colors" autoFocus />
                  {authError && <p className="text-rose-500 text-xs font-bold mb-4">{authError}</p>}
                  <div className="flex space-x-3 mt-6">
                    <button onClick={() => {setShowAuthModal(false); setAuthError(''); setPasscodeInput('');}} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition">Hủy</button>
                    <button onClick={verifyPasscode} className="flex-1 py-3 bg-gradient-to-r from-amber-500 to-amber-600 text-slate-950 font-black rounded-xl transition shadow-lg">Xác nhận</button>
                  </div>
                </div>
              </div>
            )}
          </div>
          </>
        );
      }

      return (
        <>
           {showIntro && <IntroScreen onComplete={() => setShowIntro(false)} />}
           <DraftApplication role={role} user={user} dbError={dbError} onBack={() => setRole(null)} currentPasscode={currentPasscode} />
        </>
      );
    }

    // --- 5. COMPONENT HỆ THỐNG DRAFT ---
    function DraftApplication({ role, user, dbError, onBack, currentPasscode }) {
      const [teams, setTeams] = useState(INITIAL_TEAMS);
      const [availablePlayers, setAvailablePlayers] = useState([]);
      const [config, setConfig] = useState(DEFAULT_CONFIG);
      
      // Xổ số thường
      const [lottery, setLottery] = useState({ active: false, phase: '', player: null, team: null });
      
      // Xổ số Đội trưởng / Bốc Nhanh (The Big Bang)
      const [captainReveal, setCaptainReveal] = useState({ active: false, type: 'captain', assignments: [] });
      
      // Modal Admin Edit
      const [editingPlayer, setEditingPlayer] = useState(null);
      const [editFormData, setEditFormData] = useState({ name: '', position: '', isCaptain: false, targetTeamId: 'pool' });

      const [showSettings, setShowSettings] = useState(false);
      const [csvInput, setCsvInput] = useState('');
      const [newPasscode, setNewPasscode] = useState(currentPasscode);
      const [syncStatus, setSyncStatus] = useState('saved');
      
      const lastProcessedCmdId = useRef(null);
      const lastCaptainCmdId = useRef(null);
      const isFirstLoad = useRef(true);

      const [isSynced, setIsSynced] = useState(true);

      useEffect(() => {
        if (!user || dbError) return;
        const docRef = getMainDocRef();
        
        const unsubscribe = docRef.onSnapshot({ includeMetadataChanges: true }, (docSnap) => {
          setIsSynced(!docSnap.metadata.hasPendingWrites);
          
          if (docSnap.exists) {
            const data = docSnap.data();
            
            const currentTeams = data.teams || INITIAL_TEAMS;
            const currentAvailable = data.availablePlayers || [];

            if (isFirstLoad.current) {
               isFirstLoad.current = false;
               if (data.lotteryCmd) lastProcessedCmdId.current = data.lotteryCmd.id;
               if (data.captainCmd) lastCaptainCmdId.current = data.captainCmd.id;
            }

            setTeams(currentTeams);
            setAvailablePlayers(currentAvailable);
            if (data.config) setConfig(data.config);
            
            // Lắng nghe lệnh bốc thăm thường
            if (data.lotteryCmd && data.lotteryCmd.id !== lastProcessedCmdId.current) {
              lastProcessedCmdId.current = data.lotteryCmd.id;
              playLotteryAnimation(data.lotteryCmd.player, data.lotteryCmd.team, currentTeams, currentAvailable);
            }
            
            // Lắng nghe lệnh Mở thẻ Đội trưởng hoặc Bốc nhanh
            if (data.captainCmd && data.captainCmd.id !== lastCaptainCmdId.current) {
              lastCaptainCmdId.current = data.captainCmd.id;
              playCaptainRevealAnimation(data.captainCmd.assignments, data.captainCmd.type || 'captain', currentTeams, currentAvailable);
            }

            // Sync đóng bảng cho Viewer khi Admin đã click xác nhận
            if (!data.lotteryCmd) setLottery(prev => prev.active && prev.phase === 'result' ? { active: false, phase: '', player: null, team: null } : prev);
            if (!data.captainCmd) setCaptainReveal(prev => prev.active ? { active: false, type: 'captain', assignments: [] } : prev);

          } else if (role === 'admin') {
             docRef.set({ teams: INITIAL_TEAMS, availablePlayers: [], config: DEFAULT_CONFIG, lotteryCmd: null, captainCmd: null }, { merge: true });
             isFirstLoad.current = false;
          }
        }, (err) => console.error("Snapshot error:", err));

        return () => unsubscribe();
      }, [user, role, dbError]);

      const syncToCloud = async (updates) => {
        if (user && !dbError) {
          setSyncStatus('saving');
          const docRef = getMainDocRef();
          await docRef.set(updates, { merge: true });
          setTimeout(() => setSyncStatus('saved'), 500); 
        }
      };

      const savePasscodeToCloud = async (newPass) => {
        if (user && !dbError && newPass.trim() !== '') {
          const docRef = getSecurityDocRef();
          await docRef.set({ passcode: newPass }, { merge: true });
          alert("Đã lưu Passcode mới thành công!");
        }
      };

      // TÍNH NĂNG 1: BỐC THĂM ĐỘI TRƯỞNG (BIG BANG + GÁN SẴN THEO EXCEL)
      const triggerCaptainDraw = async () => {
          const captainsInPool = availablePlayers.filter(p => p.isCaptain);
          if (captainsInPool.length === 0) {
              alert("Không có đội trưởng nào trong danh sách chờ!");
              return;
          }
          if (teams.some(t => t.players.length > 0)) {
              if(!window.confirm("Đã có người trong các đội. Bạn vẫn muốn tung đội trưởng chứ?")) return;
          }

          const assignments = [];
          let currentTeamsState = JSON.parse(JSON.stringify(teams)); // deep copy để giả lập
          let leftoverCaptains = []; // Những đội trưởng không có tên đội gán sẵn

          // 1. Quét ưu tiên: Ai có preAssignedTeam thì xếp thẳng vào đội đó
          captainsInPool.forEach(cap => {
              let assigned = false;
              if (cap.preAssignedTeam) {
                  const targetTeamName = cap.preAssignedTeam.toLowerCase().trim();
                  const actualTeamIndex = currentTeamsState.findIndex(t => t.name.toLowerCase().trim() === targetTeamName);
                  
                  if (actualTeamIndex !== -1 && currentTeamsState[actualTeamIndex].players.length < config.maxPlayersPerTeam) {
                      // Gán thẳng vào đội
                      assignments.push({ player: cap, team: teams[actualTeamIndex] });
                      currentTeamsState[actualTeamIndex].players.push(cap);
                      assigned = true;
                  }
              }
              if (!assigned) {
                  leftoverCaptains.push(cap); // Trả về kho random nếu không có tên đội hoặc đội đã đầy
              }
          });

          // 2. Random cho những đội trưởng còn lại
          leftoverCaptains.sort(() => 0.5 - Math.random());
          for (let cap of leftoverCaptains) {
              const validTeamsNow = currentTeamsState.filter(t => t.players.length < config.maxPlayersPerTeam);
              if (validTeamsNow.length === 0) break;
              
              // Cân bằng số lượng: Ưu tiên đội có ít người nhất
              const minPlayersCount = Math.min(...validTeamsNow.map(t => t.players.length));
              const eligibleTeams = validTeamsNow.filter(t => t.players.length === minPlayersCount);
              
              // Bốc 1 đội ngẫu nhiên trong danh sách hợp lệ
              const chosenTeam = eligibleTeams[Math.floor(Math.random() * eligibleTeams.length)];
              const teamIndex = currentTeamsState.findIndex(t => t.id === chosenTeam.id);
              
              assignments.push({ player: cap, team: teams[teamIndex] });
              currentTeamsState[teamIndex].players.push(cap);
          }

          const cmdId = Date.now().toString();
          await syncToCloud({ captainCmd: { id: cmdId, type: 'captain', assignments } });
      };

      // TÍNH NĂNG MỚI: BỐC NHANH 6 NGƯỜI CÙNG LÚC (CÓ TÔN TRỌNG ĐỘI GÁN SẴN)
      const triggerFastDraw = async () => {
          if (availablePlayers.length === 0 || lottery.active || captainReveal.active) return;
          
          const validTeams = teams.filter(t => t.players.length < config.maxPlayersPerTeam);
          if (validTeams.length === 0) {
              alert("Tất cả các đội bóng đã đủ người!");
              return;
          }

          const numToDraw = Math.min(validTeams.length, availablePlayers.length, 6);
          
          let nonCaptains = availablePlayers.filter(p => !p.isCaptain);
          let captains = availablePlayers.filter(p => p.isCaptain);
          nonCaptains.sort(() => 0.5 - Math.random());
          captains.sort(() => 0.5 - Math.random());
          
          let pool = [...nonCaptains, ...captains].slice(0, numToDraw);
          pool.sort(() => 0.5 - Math.random()); 

          const assignments = [];
          let currentTeamsState = JSON.parse(JSON.stringify(teams)); 

          for (let i = 0; i < pool.length; i++) {
              const player = pool[i];
              let teamFound = null;

              // Ưu tiên 1: Đội gán sẵn
              if (player.preAssignedTeam) {
                  const targetTeamName = player.preAssignedTeam.toLowerCase().trim();
                  const actualTeamIndex = currentTeamsState.findIndex(t => t.name.toLowerCase().trim() === targetTeamName);
                  if (actualTeamIndex !== -1 && currentTeamsState[actualTeamIndex].players.length < config.maxPlayersPerTeam) {
                      teamFound = currentTeamsState[actualTeamIndex];
                  }
              }

              // Ưu tiên 2: Cân bằng ngẫu nhiên
              if (!teamFound) {
                  const validTeamsNow = currentTeamsState.filter(t => t.players.length < config.maxPlayersPerTeam);
                  if (validTeamsNow.length === 0) break;

                  const minPlayersCount = Math.min(...validTeamsNow.map(t => t.players.length));
                  let eligibleTeams = validTeamsNow.filter(t => t.players.length === minPlayersCount);

                  // Cân bằng vị trí
                  const positionCounts = eligibleTeams.map(t => t.players.filter(p => p.position === player.position).length);
                  const minPosCount = Math.min(...positionCounts);
                  eligibleTeams = eligibleTeams.filter(t => t.players.filter(p => p.position === player.position).length === minPosCount);

                  teamFound = eligibleTeams[Math.floor(Math.random() * eligibleTeams.length)];
              }
              
              if (teamFound) {
                 assignments.push({ player, team: teams.find(t => t.id === teamFound.id) });
                 const teamIndex = currentTeamsState.findIndex(t => t.id === teamFound.id);
                 currentTeamsState[teamIndex].players.push(player);
              }
          }

          const cmdId = Date.now().toString();
          await syncToCloud({ captainCmd: { id: cmdId, type: 'fast', assignments } });
      };

      const playCaptainRevealAnimation = async (assignments, type, currentTeams, currentAvailable) => {
          setCaptainReveal({ active: true, type, assignments });
      };

      const handleCloseCaptainReveal = async () => {
          if (role !== 'admin') return;
          
          let newTeams = [...teams];
          let newAvailable = [...availablePlayers];

          captainReveal.assignments.forEach(assign => {
              newAvailable = newAvailable.filter(p => p.id !== assign.player.id);
              newTeams = newTeams.map(t => t.id === assign.team.id ? { ...t, players: [...t.players, assign.player] } : t);
          });

          setTeams(newTeams);
          setAvailablePlayers(newAvailable);
          await syncToCloud({ teams: newTeams, availablePlayers: newAvailable, captainCmd: null });
          setCaptainReveal({ active: false, type: 'captain', assignments: [] });
      };

      // TÍNH NĂNG 2: BỐC THĂM THƯỜNG (CÂN BẰNG TẤT CẢ VỊ TRÍ + ĐỘI GÁN SẴN)
      const triggerNextDraw = async () => {
        if (availablePlayers.length === 0 || lottery.active || captainReveal.active) return;
        
        const nonCaptains = availablePlayers.filter(p => !p.isCaptain);
        const poolToDraw = nonCaptains.length > 0 ? nonCaptains : availablePlayers;
        const actualPlayer = poolToDraw[Math.floor(Math.random() * poolToDraw.length)];
        
        let actualTeam = null;

        // Ưu tiên 1: Xem người này có được gán sẵn đội nào trong Excel không
        if (actualPlayer.preAssignedTeam) {
            const targetTeamName = actualPlayer.preAssignedTeam.toLowerCase().trim();
            const foundTeam = teams.find(t => t.name.toLowerCase().trim() === targetTeamName);

            if (foundTeam && foundTeam.players.length < config.maxPlayersPerTeam) {
                actualTeam = foundTeam; 
            }
        }

        // Ưu tiên 2: Logic cân bằng nếu không gán sẵn
        if (!actualTeam) {
            const validTeams = teams.filter(t => t.players.length < config.maxPlayersPerTeam);
            if (validTeams.length === 0) {
                alert("Tất cả các đội bóng đã đủ người!");
                return;
            }

            const minPlayersCount = Math.min(...validTeams.map(t => t.players.length));
            let eligibleTeams = validTeams.filter(t => t.players.length === minPlayersCount);
            
            const positionCounts = eligibleTeams.map(t => t.players.filter(p => p.position === actualPlayer.position).length);
            const minPosCount = Math.min(...positionCounts);
            eligibleTeams = eligibleTeams.filter(t => t.players.filter(p => p.position === actualPlayer.position).length === minPosCount);

            actualTeam = eligibleTeams[Math.floor(Math.random() * eligibleTeams.length)];
        }
        
        const cmdId = Date.now().toString();
        await syncToCloud({ lotteryCmd: { id: cmdId, player: actualPlayer, team: actualTeam } });
      };

      const playLotteryAnimation = async (actualPlayer, actualTeam, currentTeams, currentAvailable) => {
        setLottery({ active: true, phase: 'spin_player', player: null, team: null });
        const pool = currentAvailable.length > 0 ? currentAvailable : [actualPlayer];

        for(let i=0; i<25; i++) {
          setLottery(prev => ({...prev, player: pool[Math.floor(Math.random()*pool.length)]}));
          await new Promise(r => setTimeout(r, 60 + (i*2)));
        }
        
        setLottery(prev => ({...prev, phase: 'show_player', player: actualPlayer}));
        await new Promise(r => setTimeout(r, 1500));

        setLottery(prev => ({...prev, phase: 'spin_team'}));
        for(let i=0; i<20; i++) {
          setLottery(prev => ({...prev, team: currentTeams[Math.floor(Math.random()*currentTeams.length)]}));
          await new Promise(r => setTimeout(r, 80 + (i*3)));
        }

        setLottery(prev => ({...prev, phase: 'result', team: actualTeam}));
      };

      const handleCloseLottery = async () => {
        if (role !== 'admin' || lottery.phase !== 'result') return;
        
        const actualPlayer = lottery.player;
        const actualTeam = lottery.team;
        const newTeams = teams.map(t => t.id === actualTeam.id ? { ...t, players: [...t.players, actualPlayer] } : t);
        const newAvailable = availablePlayers.filter(p => p.id !== actualPlayer.id);
        
        setTeams(newTeams);
        setAvailablePlayers(newAvailable);
        await syncToCloud({ teams: newTeams, availablePlayers: newAvailable, lotteryCmd: null });
        
        setLottery({ active: false, phase: '', player: null, team: null });
      };

      const resetDraw = async () => {
        if (!window.confirm("CẢNH BÁO: Hành động này sẽ XÓA TOÀN BỘ KẾT QUẢ và làm lại từ đầu. Chắc chắn chứ?")) return;
        const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
        setTeams(newTeams);
        if (role === 'admin') await syncToCloud({ teams: newTeams, availablePlayers: [] });
      };

      // Nạp Excel: Tự quét chữ C, Đội Trưởng, và tên các Đội bóng
      const handleImportExcel = async () => {
        if (!csvInput.trim()) return;
        const lines = csvInput.split('\n');
        const newPlayers = [];
        
        lines.forEach((line, index) => {
          if (!line.trim()) return;
          let separator = line.includes('\t') ? '\t' : ',';
          const parts = line.split(separator).map(p => p.trim());
          
          if (parts.length >= 2) {
             let namePart = "";
             let posPart = "";
             let isCaptain = false;
             let preAssignedTeam = null;
             
             let startIndex = 0;
             if (!isNaN(parts[0]) || parts[0].toLowerCase() === 'stt') {
                if (parts[0].toLowerCase() === 'stt') return;
                startIndex = 1;
             } else {
                if (parts[0].toLowerCase().includes('tên')) return;
                startIndex = 0;
             }

             namePart = parts[startIndex];
             posPart = parts[startIndex + 1] || 'Khác';

             // Vòng lặp siêu việt: Quét TẤT CẢ các cột còn lại để tìm Manh mối (C, hoặc tên Đội)
             for (let i = startIndex + 2; i < parts.length; i++) {
                 let val = parts[i] ? parts[i].trim().toLowerCase() : '';
                 if (!val) continue;

                 if (val === 'c' || val === 'x' || val.includes('đội trưởng') || val.includes('có')) {
                     isCaptain = true;
                 }

                 let matchedTeam = config.teamNames.find(t => val.includes(t.toLowerCase()));
                 if (matchedTeam) {
                     preAssignedTeam = matchedTeam;
                 } else if (val.includes('đội') && !val.includes('đội trưởng')) {
                     preAssignedTeam = parts[i];
                 }
             }

             let name = namePart;
             let position = posPart;

             // Bắt từ khóa trong tên luôn (VD: Nguyễn Văn A (C))
             if (name.includes('(C)') || name.includes('(c)')) {
                 isCaptain = true;
                 name = name.replace(/\(c\)/ig, '').trim();
             }

             if(position.toLowerCase().includes('thủ')) position = 'Thủ môn';
             else if(position.toLowerCase().includes('hậu')) position = 'Hậu vệ';
             else if(position.toLowerCase().includes('vệ') && !position.toLowerCase().includes('tiền')) position = 'Hậu vệ';
             else if(position.toLowerCase().includes('tiền vệ')) position = 'Tiền vệ';
             else if(position.toLowerCase().includes('đạo')) position = 'Tiền đạo';
             else position = 'Khác';

             if (name) {
                newPlayers.push({ id: `p-${Date.now()}-${index}`, name, position, isCaptain, preAssignedTeam });
             }
          }
        });

        if (newPlayers.length > 0) {
          setAvailablePlayers(newPlayers);
          setShowSettings(false);
          setCsvInput('');
          const newTeams = INITIAL_TEAMS.map((t, idx) => ({ ...t, name: config.teamNames[idx], players: [] }));
          setTeams(newTeams);
          await syncToCloud({ availablePlayers: newPlayers, teams: newTeams });
        } else {
          alert("Không nhận diện được cầu thủ. Hãy copy đúng cấu trúc Excel nhé!");
        }

          if (editingPlayer.originalTeamId === 'pool') {

              newTeams = newTeams.map(t => {

            else team.players.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} ${p.isCaptain ? '(C)' : ''} - [${p.position}]\n`; });

         });
         content += `>> DANH SÁCH CHỜ (Chưa bốc: ${availablePlayers.length})\n`;
         if (availablePlayers.length > 0) availablePlayers.forEach((p, idx) => { content += `   ${idx + 1}. ${p.name} ${p.isCaptain ? '(C)' : ''} - [${p.position}]\n`; });

         const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
         const url = URL.createObjectURL(blob);
         const link = document.createElement('a');
         link.href = url;
         link.download = `Ket_Qua_Draft_${new Date().toISOString().split('T')[0]}.txt`;

         link.click();

      const getPlayerNameClass = (name) => {

          if (len >= 16) return 'text-2xl sm:text-3xl md:text-4xl lg:text-5xl xl:text-6xl';

                <div className="absolute inset-0 overflow-hidden pointer-events-none">
                    <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-yellow-600/20 rounded-full blur-[100px] aurora-1 mix-blend-screen"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-amber-500/20 rounded-full blur-[120px] aurora-2 mix-blend-screen"></div>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[40vw] h-[40vw] bg-orange-600/20 rounded-full blur-[100px] aurora-3 mix-blend-screen"></div>
                </div>

                {/* LỚP 2: Các ngôi sao lấp lánh */}
                <div className="absolute inset-0 pointer-events-none">
                    {renderStars(40)}
                </div>

                {/* Rotating rays background */}
                <div className="absolute top-1/2 left-1/2 w-[200vw] h-[200vw] bg-[conic-gradient(from_0deg,transparent_0deg,#fbbf2422_10deg,transparent_20deg,transparent_40deg,#fbbf2422_50deg,transparent_60deg,transparent_80deg,#fbbf2422_90deg,transparent_100deg)] mix-blend-screen" style={{animation: 'fifaRays 25s linear infinite'}}></div>
                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#020617]/60 to-[#020617]"></div>
                
                {/* Main Content Flow - Dùng Flexbox để chống tràn */}
                <div className="relative z-30 flex flex-col items-center justify-between w-full h-full p-4 md:p-6 lg:p-8">

                    {/* Top: Title */}
                    <h2 className={`text-3xl sm:text-4xl md:text-6xl font-black text-transparent bg-clip-text uppercase tracking-[0.2em] animate-pulse mt-2 md:mt-4 text-center flex-shrink-0 ${captainReveal.type === 'fast' ? 'bg-gradient-to-b from-blue-100 via-blue-400 to-blue-600 drop-shadow-[0_0_30px_rgba(59,130,246,1)]' : 'bg-gradient-to-b from-yellow-100 via-yellow-400 to-yellow-600 drop-shadow-[0_0_30px_rgba(250,204,21,1)]'}`} style={{ textShadow: `0 4px 20px ${captainReveal.type === 'fast' ? 'rgba(59,130,246,0.5)' : 'rgba(250,204,21,0.5)'}` }}>
                        {captainReveal.type === 'fast' ? 'QUICK DRAFT X6' : 'CAPTAINS REVEAL'}
                    </h2>
                    
                    {/* Middle: Grid (Tự động co giãn phần này) */}
                    <div className="flex-1 flex items-center justify-center w-full min-h-0 py-4">
                        <div className="w-full max-w-6xl grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6 md:gap-8 justify-items-center" style={{ perspective: '1000px' }}>
                            {captainReveal.assignments.map((assign, idx) => (
                                <div key={idx} className="card-reveal-fifa w-full max-w-[140px] sm:max-w-[200px] md:max-w-[240px] lg:max-w-[260px] xl:max-w-[280px]" style={{animationDelay: `${idx * 0.7}s`}}>
                                    <div className={`relative rounded-2xl sm:rounded-3xl overflow-hidden border-2 sm:border-4 bg-gradient-to-br ${assign.team.colorFrom} ${assign.team.colorTo} aspect-[3/4] flex flex-col justify-end p-3 sm:p-5 transform transition-transform duration-300 hover:scale-105 ${captainReveal.type === 'fast' ? 'border-blue-400 shadow-[0_0_40px_rgba(59,130,246,0.4)] hover:shadow-[0_0_60px_rgba(59,130,246,0.8)]' : 'border-yellow-400 shadow-[0_0_40px_rgba(250,204,21,0.4)] hover:shadow-[0_0_60px_rgba(250,204,21,0.8)]'}`}>
                                        
                                        {/* Logo chìm làm nền */}
                                        {assign.team.logo && <img src={assign.team.logo} alt="Logo BG" className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[140%] object-contain opacity-15 pointer-events-none mix-blend-overlay filter blur-[4px]" />}
                                        
                                        {/* Logo chính diện phóng to mượt mà */}
                                        {assign.team.logo && <img src={assign.team.logo} alt="Logo" className="absolute top-1/2 left-1/2 w-20 h-20 sm:w-28 sm:h-28 md:w-36 md:h-36 object-contain opacity-90 pointer-events-none drop-shadow-[0_0_20px_rgba(0,0,0,0.8)]" style={{animation: `smoothCardLogoReveal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${idx * 0.7 + 0.3}s both`}} />}
                                        
                                        {assign.player.isCaptain && (
                                            <div className="absolute top-3 left-3 sm:top-4 sm:left-4 flex flex-col items-center bg-black/50 p-1.5 sm:p-2.5 rounded-xl sm:rounded-2xl border border-yellow-400/50 backdrop-blur-md shadow-lg">
                                                <span className="text-xl sm:text-3xl lg:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-300 to-yellow-600 italic drop-shadow-lg leading-none mb-0.5 sm:mb-1">C</span>
                                                <div className="w-3 h-3 sm:w-5 sm:h-5 flex items-center justify-center">
                                                    <IconCrown size="100%" className="text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]"/>
                                                </div>
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-50 mix-blend-overlay pointer-events-none"></div>
                                        
                                        <div className="relative z-10 text-center bg-gradient-to-t from-black via-black/80 to-transparent pt-10 sm:pt-16 pb-2 sm:pb-3 -mx-3 sm:-mx-5 -mb-3 sm:-mb-5 px-2 sm:px-4">
                                            <div className={`${captainReveal.type === 'fast' ? 'text-blue-300' : 'text-yellow-400'} font-black uppercase tracking-[0.2em] text-[8px] sm:text-xs lg:text-sm mb-0.5 sm:mb-1 drop-shadow-md`}>{assign.team.name}</div>
                                            <div className={`text-white font-black uppercase italic leading-tight drop-shadow-[0_2px_5px_rgba(0,0,0,1)] whitespace-nowrap w-full flex justify-center px-1 ${getCaptainNameClass(assign.player.name)}`}>{assign.player.name}</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Bottom: Instruction */}
                    <div className={`animate-pulse text-[10px] md:text-sm font-black tracking-[0.2em] uppercase text-center flex-shrink-0 z-40 drop-shadow-lg bg-black/60 px-6 py-3 rounded-full border mb-2 md:mb-4 ${captainReveal.type === 'fast' ? 'text-blue-400/90 border-blue-400/40' : 'text-yellow-400/90 border-yellow-400/40'}`}>
                        {role === 'admin' ? '(CLICK VÀO MÀN HÌNH ĐỂ LƯU KẾT QUẢ & TIẾP TỤC)' : 'ĐANG CHỜ ADMIN XÁC NHẬN...'}
                    </div>

                </div>
            </div>
          )}

          {/* OVERLAY XỔ SỐ THƯỜNG */}
          {lottery.active && (
            <div onClick={role === 'admin' && lottery.phase === 'result' ? handleCloseLottery : null} className={`fixed inset-0 z-[100] flex flex-col items-center justify-center overflow-hidden font-sans ${role === 'admin' && lottery.phase === 'result' ? 'cursor-pointer' : 'pointer-events-none'}`}>
              
              {/* LỚP NỀN: Gradient sâu thẳm */}
              <div className="absolute inset-0 bg-gradient-to-br from-slate-900 via-[#020617] to-slate-950/95 backdrop-blur-md"></div>

              {/* LỚP 1: Hào quang chuyển động (Đổi màu theo đội hoặc ngẫu nhiên lúc đang quay) */}
              {lottery.phase === 'result' && lottery.team ? (
                  <div className="absolute inset-0 opacity-40 mix-blend-screen pointer-events-none transition-all duration-1000">
                       <div className={`absolute top-0 left-0 w-[60vw] h-[60vw] bg-gradient-to-br ${lottery.team.colorFrom} ${lottery.team.colorTo} rounded-full blur-[150px] aurora-1`}></div>
                       <div className={`absolute bottom-0 right-0 w-[60vw] h-[60vw] bg-gradient-to-br ${lottery.team.colorFrom} ${lottery.team.colorTo} rounded-full blur-[150px] aurora-2`}></div>
                  </div>
              ) : (
                  <div className="absolute inset-0 opacity-30 mix-blend-screen pointer-events-none transition-all duration-1000">
                       <div className="absolute top-[10%] left-[10%] w-[50vw] h-[50vw] bg-amber-500/30 rounded-full blur-[120px] aurora-1"></div>
                       <div className="absolute bottom-[10%] right-[10%] w-[50vw] h-[50vw] bg-blue-500/30 rounded-full blur-[120px] aurora-2"></div>
                  </div>
              )}

              {/* LỚP 2: Các ngôi sao lấp lánh */}
              <div className="absolute inset-0 pointer-events-none">
                  {renderStars(30)}
              </div>

              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150vw] h-[30vh] md:w-[120vw] md:h-[20vh] bg-white/5 blur-[80px] md:blur-[100px] -rotate-12 animate-pulse transform-gpu"></div>

              {lottery.phase === 'result' && <div className="absolute inset-0 flex justify-center items-center opacity-30 pointer-events-none"><div className={`w-[600px] h-[600px] md:w-[900px] md:h-[900px] rounded-full blur-[100px] md:blur-[120px] bg-gradient-to-tr ${lottery.team?.colorFrom} ${lottery.team?.colorTo} transform-gpu`}></div></div>}

              <h2 className={`text-lg md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-300 to-white mb-8 md:mb-14 tracking-[0.2em] md:tracking-[0.3em] uppercase z-10 relative text-center px-4 ${lottery.phase === 'result' ? 'animate-bounce text-amber-400 from-amber-200 to-amber-500 drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'animate-pulse'}`}>{lottery.phase === 'spin_player' ? 'Đang lựa chọn' : lottery.phase === 'show_player' ? 'Cầu thủ được chọn' : lottery.phase === 'spin_team' ? 'Tìm đội bóng' : 'Xác nhận gia nhập'}</h2>

              <div className="relative z-10 w-full max-w-6xl flex flex-col items-center">
                <div className={`relative bg-slate-900 border border-white/10 rounded-3xl py-6 px-4 md:py-10 md:px-8 text-center transform transition-all duration-500 w-[96%] sm:w-[90%] md:w-[85%] lg:w-[75%] ${lottery.phase !== 'spin_player' ? 'scale-100 border-amber-500/50 shadow-[0_0_40px_rgba(245,158,11,0.2)] bg-gradient-to-b from-slate-800 to-slate-900' : 'scale-95 opacity-80'} ${(lottery.phase === 'spin_team' || lottery.phase === 'result') ? '-translate-y-6 md:-translate-y-8 scale-90 md:scale-95' : ''}`}>
                   {lottery.phase !== 'spin_player' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-amber-400 to-transparent"></div>}
                   <div className="text-amber-400/80 text-xs md:text-base font-black uppercase tracking-[0.3em] md:tracking-[0.4em] mb-2 md:mb-3 flex justify-center items-center">
                       {getPositionIcon(lottery.player?.position || 'Khác')} <span className="ml-2 md:ml-3">{lottery.player?.position || 'Vị trí'}</span>
                   </div>
                   <div className={`font-black text-white uppercase italic tracking-tighter drop-shadow-xl whitespace-nowrap w-full flex justify-center px-1 sm:px-2 transition-all duration-300 leading-tight ${getPlayerNameClass(lottery.player?.name)}`}>{lottery.player?.name || '...'}</div>
                </div>

                {(lottery.phase === 'spin_team' || lottery.phase === 'result') && (
                  <div className="flex flex-col items-center animate-fade-in-up -mt-4 md:-mt-6 w-[96%] sm:w-[90%] md:w-[85%] lg:w-[75%]">
                    <div className="bg-slate-900 p-2 md:p-3 rounded-full mb-3 md:mb-4 z-20 border border-white/10 shadow-xl"><IconChevronRight className="rotate-90 text-amber-400" size={24} /></div>
                    <div className={`relative rounded-3xl py-6 px-4 md:py-10 md:px-8 w-full text-center transform transition-all duration-700 border-2 overflow-hidden ${lottery.phase === 'result' ? `scale-[1.02] md:scale-105 shadow-[0_0_50px_rgba(255,255,255,0.15)] border-white/50 bg-gradient-to-br ${lottery.team?.colorFrom} ${lottery.team?.colorTo}` : 'border-white/10 bg-slate-800'}`}>
                      {lottery.phase === 'result' && <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 mix-blend-overlay"></div>}
                      
                      <div className="flex flex-col items-center justify-center space-y-3 md:space-y-4 relative z-10">
                          {lottery.team?.logo && (
                              <img 
                                  src={lottery.team.logo} 
                                  alt="Team Logo" 
                                  className={`w-20 h-20 sm:w-28 sm:h-28 md:w-36 md:h-36 object-contain ${lottery.phase === 'spin_team' ? 'animate-fast-spin' : 'animate-logo-reveal drop-shadow-[0_0_30px_rgba(255,255,255,0.6)]'}`}
                                  onError={(e) => e.target.style.display='none'}
                              />
                          )}
                          <div className={`text-4xl sm:text-6xl md:text-7xl lg:text-8xl font-black uppercase italic tracking-tighter ${lottery.phase === 'result' ? 'text-white drop-shadow-xl' : 'text-slate-500'}`}>{lottery.team?.name || '???'}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
              
              {/* Dòng chữ hướng dẫn cho Admin / Viewer */}
              {lottery.phase === 'result' && (
                  <div className="absolute bottom-8 md:bottom-12 animate-pulse text-white/50 text-xs md:text-sm font-bold tracking-widest uppercase text-center z-20 drop-shadow-md">
                      {role === 'admin' ? '(CLICK VÀO MÀN HÌNH ĐỂ LƯU KẾT QUẢ & TIẾP TỤC)' : 'ĐANG CHỜ ADMIN XÁC NHẬN...'}
                  </div>
              )}
            </div>
          )}
          
          {/* MODAL EDIT CẦU THỦ */}
          {editingPlayer && role === 'admin' && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[150] p-4 font-sans">
               <div className="bg-slate-900 border border-amber-500/30 rounded-2xl w-full max-w-sm shadow-[0_0_30px_rgba(245,158,11,0.15)] overflow-hidden">
                   <div className="p-4 border-b border-white/10 flex justify-between items-center bg-slate-800/80">
                       <h3 className="font-black text-white uppercase flex items-center"><IconEdit size={16} className="mr-2 text-amber-400"/> Chỉnh sửa cầu thủ</h3>
                       <button onClick={() => setEditingPlayer(null)} className="text-slate-400 hover:text-white"><IconX size={18}/></button>
                   </div>
                   <div className="p-5 space-y-4">
                       <div>
                           <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Tên cầu thủ</label>
                           <input type="text" value={editFormData.name} onChange={e => setEditFormData({...editFormData, name: e.target.value})} className="w-full bg-slate-950 border border-white/10 rounded-lg px-3 py-2 text-white focus:border-amber-400 focus:outline-none" />
                       </div>
                       <div>
                           <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Vị trí</label>
                           <select value={editFormData.position} onChange={e => setEditFormData({...editFormData, position: e.target.value})} className="w-full bg-slate-950 border border-white/10 rounded-lg px-3 py-2 text-white focus:border-amber-400 focus:outline-none">
                               {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
                           </select>
                       </div>
                       <div className="flex items-center space-x-2 bg-slate-800/50 p-3 rounded-lg border border-white/5">
                           <input type="checkbox" id="isCap" checked={editFormData.isCaptain} onChange={e => setEditFormData({...editFormData, isCaptain: e.target.checked})} className="w-4 h-4 accent-amber-500" />
                           <label htmlFor="isCap" className="text-sm font-bold text-yellow-400 flex items-center cursor-pointer select-none"><IconCrown size={16} className="mr-1"/> Đánh dấu là Đội Trưởng</label>
                       </div>
                       <div>
                           <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Thuyên chuyển đến</label>
                           <select value={editFormData.targetTeamId} onChange={e => setEditFormData({...editFormData, targetTeamId: e.target.value})} className="w-full bg-slate-950 border border-white/10 rounded-lg px-3 py-2 text-amber-400 font-bold focus:border-amber-400 focus:outline-none">
                               <option value="pool">📋 Trả về Danh sách chờ</option>
                               {teams.map(t => <option key={t.id} value={t.id}>🛡️ {t.name}</option>)}
                           </select>
                       </div>
                       <button onClick={savePlayerEdit} className="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-black font-black uppercase py-3 rounded-xl mt-2">Lưu thay đổi</button>
                   </div>
               </div>
            </div>
          )}

          {/* MODAL CÀI ĐẶT */}
          {showSettings && role === 'admin' && (
            <div className="fixed inset-0 bg-[#020617]/90 backdrop-blur-sm flex items-center justify-center z-[110] p-3 md:p-4 font-sans">
              <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[95vh] md:max-h-[90vh]">
                <div className="p-4 md:p-5 border-b border-white/10 flex justify-between items-center bg-slate-800/80"><h2 className="text-lg md:text-xl font-black tracking-widest uppercase flex items-center text-white"><IconSettings className="mr-2 md:mr-3 text-amber-400" size={18} /> Cài đặt</h2><button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white transition-colors bg-white/5 p-1.5 md:p-2 rounded-lg"><IconX size={18} /></button></div>
                <div className="p-4 md:p-6 overflow-y-auto space-y-6 md:space-y-8 custom-scrollbar">
                  <div className="flex space-x-3 md:space-x-4">
                     <button onClick={handleExportData} className="flex-1 bg-emerald-600/20 hover:bg-emerald-600/40 border border-emerald-500/30 text-emerald-400 rounded-xl p-3 md:p-4 flex flex-col items-center justify-center transition-all group"><IconDownload size={20} className="mb-1 md:mb-2 group-hover:scale-110 transition-transform"/><span className="font-bold text-[10px] md:text-sm uppercase tracking-widest">Xuất File (.TXT)</span></button>
                     <button onClick={resetDraw} className="flex-1 bg-rose-600/20 hover:bg-rose-600/40 border border-rose-500/30 text-rose-400 rounded-xl p-3 md:p-4 flex flex-col items-center justify-center transition-all group"><IconRotateCcw size={20} className="mb-1 md:mb-2 group-hover:-rotate-180 transition-transform duration-500"/><span className="font-bold text-[10px] md:text-sm uppercase tracking-widest">Làm lại từ đầu</span></button>
                  </div>
                  <div className="bg-slate-800 border border-white/10 rounded-xl p-3 md:p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                     <div><h4 className="text-white font-bold text-sm flex items-center"><IconKeyRound size={14} className="mr-2 text-amber-400"/> Đổi mật khẩu</h4><p className="text-[10px] md:text-xs text-slate-500 mt-1">Pass hiện tại để vào phòng Admin</p></div>
                     <div className="flex space-x-2"><input type="text" value={newPasscode} onChange={(e) => setNewPasscode(e.target.value)} className="bg-slate-950 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-white w-full sm:w-32 focus:border-amber-400 focus:outline-none" /><button onClick={() => savePasscodeToCloud(newPasscode)} className="bg-slate-700 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition">Lưu</button></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4 md:gap-6"><div><label className="block text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Số lượng / Đội</label><select value={config.maxPlayersPerTeam} onChange={async (e) => { const v = parseInt(e.target.value); setConfig({...config, maxPlayersPerTeam: v}); await syncToCloud({ config: {...config, maxPlayersPerTeam: v} }); }} className="w-full bg-slate-800 border border-white/10 rounded-xl px-3 md:px-4 py-2.5 md:py-3 text-sm md:text-base text-white font-bold transition-colors">{[5,6,7,8,9,10,11,15,20].map(n => <option key={n} value={n}>{n} Người</option>)}</select></div></div>
                  <div>
                    <label className="block text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 md:mb-3">Tên đội bóng</label>
                    <div className="grid grid-cols-2 gap-3 md:gap-4">
                      {config.teamNames.map((name, i) => (
                        <div key={i} className="relative"><div className={`absolute top-0 left-0 w-1 h-full rounded-l-xl bg-gradient-to-b ${INITIAL_TEAMS[i].colorFrom} ${INITIAL_TEAMS[i].colorTo}`}></div><input type="text" value={name} onChange={(e) => handleTeamNameChange(i, e.target.value)} placeholder={`Đội ${i+1}`} className="w-full bg-slate-800 border border-white/10 rounded-xl pl-4 md:pl-5 pr-2 md:pr-3 py-2 md:py-2.5 text-xs md:text-sm font-bold text-white transition-colors focus:border-amber-400 focus:outline-none" /></div>
                      ))}
                    </div>
                  </div>
                  <div className="border-t border-white/10 pt-6 md:pt-8">
                     <h3 className="text-base md:text-lg font-black text-amber-400 uppercase tracking-widest mb-1 md:mb-2 flex items-center"><IconUpload className="mr-2" size={16}/> Nạp dữ liệu Excel/CSV</h3>
                     <p className="text-[10px] md:text-xs text-rose-400 mb-3 font-bold">* Mẹo: Hệ thống tự quét toàn bộ chữ "Đội Trưởng", "C" hoặc tên của Đội Bóng (VD: Tinh Hoa, Kỳ Tài...) từ các cột để phân loại tự động.</p>
                     <textarea value={csvInput} onChange={(e) => setCsvInput(e.target.value)} placeholder="STT  |  Tên Cầu Thủ  |  Vị Trí  |  C (Đội Trưởng) hoặc Tên Đội Bóng (Nêú có)" className="w-full h-32 md:h-40 bg-slate-950 border border-white/10 rounded-xl p-3 md:p-4 text-xs md:text-sm font-mono text-slate-300 custom-scrollbar focus:border-amber-400 focus:outline-none" />
                     <button onClick={handleImportExcel} className="mt-3 md:mt-4 w-full bg-gradient-to-r from-slate-700 to-slate-600 hover:from-amber-500 hover:to-amber-600 text-white font-black uppercase tracking-widest py-3 md:py-3.5 rounded-xl transition-all shadow-lg text-sm md:text-base">Cập nhật Database</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
